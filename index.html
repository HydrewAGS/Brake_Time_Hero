<style>
  :root{
    /* yüzeyler — sıcak, derin taş/maun tonları, kademeli yükseklik hissi için */
    --bg-0:#120d0a;
    --bg-1:#1a1410;
    --bg-2:#241c16;
    --bg-3:#2f251c;
    --bg-4:#3b2e22;
    --line:#3c2f23;
    --line-soft:#271f18;

    --ink:#f2e8d8;
    --ink-dim:#c4b399;
    --ink-faint:#8c7b64;

    --accent:#8fae87;
    --accent-dim:#4d6249;
    --accent-bright:#b3d1aa;

    --gold:#dcae5a;
    --gold-dim:#8a6c38;
    --danger:#c1594a;
    --heal:#6fa593;

    --r-common:#9a9088;
    --r-uncommon:#5fbf6f;
    --r-rare:#5b9de0;
    --r-epic:#b876e0;
    --r-legendary:#dcae5a;

    --radius-sm:7px;
    --radius:12px;
    --radius-lg:18px;

    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px;

    --font-display: -apple-system, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'Consolas', 'SFMono-Regular', Menlo, monospace;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(ellipse at 50% -10%, #2b241f 0%, #100d0b 70%);
    color:var(--ink);
    font-family:var(--font-display);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--accent-dim); }

  /* ---------- pencere çerçevesi ---------- */
  .os-window{
    position:relative;
    width:min(980px, 96vw);
    height:min(680px, 94vh);
    background:var(--bg-1);
    border-radius:12px;
    border:1px solid #000;
    box-shadow: 0 30px 70px -20px rgba(0,0,0,.7), 0 0 0 1px #3a3128 inset;
    display:flex; flex-direction:column;
    overflow:hidden;
    transition: height .35s cubic-bezier(.4,0,.2,1), box-shadow .35s;
  }
  .os-window.minimized{ height:46px; }
  .titlebar{
    height:34px; min-height:34px;
    background:linear-gradient(180deg,#2c2520,#221c18);
    border-bottom:1px solid #000;
    display:flex; align-items:center;
    padding:0 8px 0 12px;
    gap:8px;
    -webkit-user-select:none; user-select:none;
    cursor:default;
  }
  .titlebar .tb-icon{ display:flex; align-items:center; filter:saturate(1.15); opacity:.9; }
  .titlebar .tb-icon svg{ width:15px; height:15px; display:block; }
  .titlebar .tb-title{ font-size:11.5px; font-weight:600; color:var(--ink-faint); letter-spacing:.4px; flex:1; }
  .tb-btns{ display:flex; gap:6px; }
  .tb-btn{
    width:13px; height:13px; border-radius:50%; border:1px solid rgba(0,0,0,.4);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:8px; color:transparent;
  }
  .tb-btn:hover{ color:rgba(0,0,0,.55); }
  .tb-min{ background:#d9a441; }
  .tb-max{ background:#6fa572; }
  .tb-close{ background:#c1594a; }

  .toast{
    position:absolute; left:50%; top:44px; transform:translateX(-50%);
    background:#000000cc; color:var(--ink); border:1px solid var(--line);
    padding:8px 14px; border-radius:8px; font-size:12.5px; z-index:50;
    pointer-events:none; opacity:0; transition:opacity .25s, top .25s;
  }
  .toast.show{ opacity:1; top:52px; }

  /* ---------- üst istatistik çubuğu ---------- */
  .statbar{
    display:flex; align-items:center; gap:var(--sp-3);
    padding:10px var(--sp-4); background:var(--bg-2); border-bottom:1px solid var(--line);
    font-size:12.5px; color:var(--ink-dim);
  }
  .statbar b{ color:var(--ink); font-weight:600; }
  .stat-item{ display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .stat-icon{ font-size:13px; }
  .gold-amt{ color:var(--gold); font-family:var(--font-mono); font-weight:700; font-size:13px; }
  .statbar .spacer{ flex:1; }

  .wallet{
    display:flex; align-items:center; gap:var(--sp-3);
    background:var(--bg-1); border:1px solid var(--line-soft); border-radius:999px;
    padding:6px 14px;
  }
  .wallet-div{ width:1px; height:14px; background:var(--line); }

  .stage-pill{
    background:var(--bg-1); border:1px solid var(--line-soft); border-radius:999px;
    padding:6px 8px 6px 16px; font-size:12.5px; font-weight:600; letter-spacing:.2px;
    display:flex; align-items:center; gap:10px; min-width:0; color:var(--ink);
  }
  #statStageLabel{ max-width:170px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .stage-nav{ display:flex; gap:4px; }
  .stage-nav button{
    width:22px; height:22px; border-radius:50%; border:1px solid var(--line);
    background:var(--bg-2); color:var(--ink-dim); cursor:pointer; font-size:11px; line-height:1;
    transition:background .12s, color .12s;
  }
  .stage-nav button:hover:not(:disabled){ background:var(--accent-dim); color:var(--ink); }
  .stage-nav button:disabled{ opacity:.3; cursor:default; }

  .settings-menu{ position:relative; }
  .btn.icon-only{ width:32px; height:32px; padding:0; display:flex; align-items:center; justify-content:center; font-size:15px; border-radius:50%; }
  .settings-dropdown{
    position:absolute; top:calc(100% + 8px); right:0; z-index:70;
    background:var(--bg-2); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:0 14px 32px -10px #000000cc;
    padding:8px; display:flex; flex-direction:column; gap:6px; min-width:190px;
    opacity:0; transform:translateY(-6px) scale(.98); pointer-events:none;
    transition:opacity .14s ease, transform .14s ease;
  }
  .settings-dropdown.show{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .settings-dropdown .stat-item{ padding:6px 10px; font-size:11.5px; color:var(--ink-faint); }
  .settings-dropdown .btn{ width:100%; justify-content:flex-start; text-align:left; }
  .btn.danger-ghost{ color:#d99a8f; background:transparent; border-color:transparent; }
  .btn.danger-ghost:hover{ background:#3a2320; border-color:#5a332c; color:#f0b3a8; }

  /* ---------- ana içerik ---------- */
  .main{ flex:1; display:flex; min-height:0; }
  .stage-view{
    flex:1.35; position:relative; display:flex; flex-direction:column;
    background:
      radial-gradient(ellipse at 50% 120%, #241d17 0%, transparent 60%),
      repeating-linear-gradient(90deg, #1c1713 0 40px, #1a1512 40px 80px);
    border-right:1px solid var(--line);
    overflow:hidden;
    transition: background 1.1s ease;
  }
  .boss-banner{
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    background:linear-gradient(180deg,#5a2c26,#3a1c18); border:1px solid #7a3c33;
    color:#f0c9a8; font-size:10.5px; font-weight:700; padding:4px 14px; border-radius:999px; letter-spacing:.8px;
    opacity:0; transition:opacity .3s; pointer-events:none; z-index:5; box-shadow:0 4px 14px -4px #000a;
  }
  .boss-banner.show{ opacity:1; }
  .wave-progress{
    position:absolute; top:10px; left:12px; right:12px; height:4px;
    background:#000a; border-radius:3px; overflow:hidden; z-index:5;
  }
  .wave-progress-fill{ height:100%; background:var(--accent); transition:width .3s; }

  .arena{ flex:1; position:relative; display:flex; align-items:flex-end; justify-content:space-between; padding:24px 30px 34px; }
  .party-row, .enemy-row{ display:flex; gap:14px; align-items:flex-end; }
  .unit{ position:relative; width:64px; text-align:center; }
  .unit svg{ width:56px; height:56px; overflow:visible; }
  .unit.idle svg{ animation:bob 1.6s ease-in-out infinite; }
  .unit.attack svg{ animation:lunge-hero .28s ease-out; }
  .unit.enemy.attack svg{ animation:lunge-enemy .28s ease-out; }
  .unit.cast svg{ animation:cast-pulse .3s ease-out; }
  .unit.hit svg{ animation:flash .22s ease-out; }
  .unit.down svg{ opacity:.25; filter:grayscale(1); transform:rotate(90deg) translateY(6px); }
  .unit.recruit-slot{ opacity:.5; }
  .unit.boss{ transform:scale(1.32); transform-origin:50% 100%; }
  @keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes lunge-hero{ 0%{transform:translateX(0)} 40%{transform:translateX(10px) scale(1.04)} 100%{transform:translateX(0)} }
  @keyframes lunge-enemy{ 0%{transform:translateX(0)} 40%{transform:translateX(-10px) scale(1.04)} 100%{transform:translateX(0)} }
  @keyframes cast-pulse{ 0%{transform:scale(1); filter:brightness(1);} 35%{transform:scale(1.14) translateY(-2px); filter:brightness(1.6);} 100%{transform:scale(1); filter:brightness(1);} }
  @keyframes flash{ 0%{filter:brightness(1)} 30%{filter:brightness(2.6) saturate(0)} 100%{filter:brightness(1)} }
  @keyframes floaty{ 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-38px);opacity:0} }

  /* ekran sarsıntısı */
  @keyframes shake-sm{ 0%,100%{transform:translate(0,0)} 25%{transform:translate(-2px,1px)} 50%{transform:translate(2px,-1px)} 75%{transform:translate(-1px,-1px)} }
  @keyframes shake-lg{ 0%,100%{transform:translate(0,0)} 20%{transform:translate(-6px,3px)} 40%{transform:translate(5px,-3px)} 60%{transform:translate(-5px,3px)} 80%{transform:translate(4px,-2px)} }
  .arena.shake-sm{ animation:shake-sm .16s ease-in-out; }
  .arena.shake-lg{ animation:shake-lg .32s ease-in-out; }

  /* vuruş parçacıkları */
  .particle{
    position:absolute; border-radius:50%; pointer-events:none; z-index:16;
    animation:particle-fly .5s cubic-bezier(.15,.6,.4,1) forwards;
  }
  @keyframes particle-fly{
    0%{ transform:translate(0,0) scale(1); opacity:1; }
    100%{ transform:translate(var(--dx), var(--dy)) scale(.25); opacity:0; }
  }

  /* menzilli saldırı mermileri */
  .projectile{ position:absolute; pointer-events:none; z-index:14; will-change:transform; }
  .projectile svg{ display:block; overflow:visible; }

  /* seviye atlama kutlaması */
  @keyframes levelup-glow{
    0%{ filter:brightness(1) drop-shadow(0 0 0 transparent); }
    30%{ filter:brightness(1.9) drop-shadow(0 0 10px #e0a545); }
    100%{ filter:brightness(1) drop-shadow(0 0 0 transparent); }
  }
  .unit.levelup svg{ animation:levelup-glow .8s ease-out; }
  .lvl-ring{
    position:absolute; width:10px; height:10px; margin:-5px 0 0 -5px;
    border:2px solid #e0a545; border-radius:50%; pointer-events:none; z-index:17;
    animation:ring-expand .72s ease-out forwards;
  }
  @keyframes ring-expand{ 0%{ transform:scale(.3); opacity:1; } 100%{ transform:scale(3.4); opacity:0; } }
  .lvlup-pop{
    position:absolute; top:-14px; left:50%; transform:translateX(-50%);
    font-weight:800; font-size:10.5px; color:var(--gold);
    text-shadow:0 1px 3px #000, 0 0 8px #e0a54588;
    letter-spacing:.4px; white-space:nowrap; pointer-events:none;
    animation:lvlup-float 1.1s ease-out forwards; z-index:18;
  }
  @keyframes lvlup-float{
    0%{ transform:translate(-50%,0); opacity:0; }
    15%{ opacity:1; }
    100%{ transform:translate(-50%,-46px); opacity:0; }
  }

  /* oto-açılım loot bildirimleri */
  .loot-toasts{
    position:absolute; top:44px; right:10px; display:flex; flex-direction:column; gap:6px;
    z-index:60; pointer-events:none; align-items:flex-end;
  }
  .loot-toast{
    display:flex; align-items:center; gap:8px;
    background:var(--bg-2); border:1px solid var(--line); border-radius:8px;
    padding:6px 10px; font-size:11px; color:var(--ink-dim);
    box-shadow:0 6px 16px -6px #000a; min-width:140px;
    animation:loot-toast-in .22s ease-out both, loot-toast-out .3s ease-in 2.15s forwards;
  }
  .loot-toast .lt-icon{ font-size:16px; }
  .loot-toast .lt-name{ font-weight:600; }
  @keyframes loot-toast-in{ 0%{ transform:translateX(24px); opacity:0; } 100%{ transform:translateX(0); opacity:1; } }
  @keyframes loot-toast-out{ 0%{ opacity:1; } 100%{ opacity:0; transform:translateX(24px); } }

  /* sandık açılış modalı */
  .chest-reveal{ position:relative; z-index:0; text-align:center; }
  .cr-chest{ font-size:44px; display:inline-block; animation:chest-pop .5s ease-out; }
  @keyframes chest-pop{
    0%{ transform:scale(.4) rotate(-8deg); opacity:0; }
    60%{ transform:scale(1.15) rotate(4deg); opacity:1; }
    100%{ transform:scale(1) rotate(0); }
  }
  .cr-item-icon{
    font-size:38px; margin:8px 0 4px; display:block;
    animation:cr-icon-in .4s ease-out .3s both;
  }
  @keyframes cr-icon-in{
    0%{ transform:scale(0) rotate(-20deg); opacity:0; }
    100%{ transform:scale(1) rotate(0); opacity:1; }
  }
  .cr-rarity-label{ font-weight:700; letter-spacing:.6px; font-size:11.5px; text-transform:uppercase; }
  .cr-raylines{
    position:absolute; left:50%; top:36%; width:210px; height:210px; margin:-105px 0 0 -105px;
    background:conic-gradient(from 0deg,
      transparent 0deg, var(--cr-color) 8deg, transparent 18deg, transparent 42deg,
      var(--cr-color) 50deg, transparent 60deg, transparent 84deg, var(--cr-color) 92deg,
      transparent 102deg, transparent 126deg, var(--cr-color) 134deg, transparent 144deg,
      transparent 168deg, var(--cr-color) 176deg, transparent 186deg, transparent 210deg,
      var(--cr-color) 218deg, transparent 228deg, transparent 252deg, var(--cr-color) 260deg,
      transparent 270deg, transparent 294deg, var(--cr-color) 302deg, transparent 312deg,
      transparent 336deg, var(--cr-color) 344deg, transparent 354deg);
    opacity:0; border-radius:50%; z-index:-1; pointer-events:none;
    animation:ray-spin 2.4s linear infinite, ray-fade-in .3s ease-out forwards;
  }
  @keyframes ray-spin{ 0%{ transform:rotate(0); } 100%{ transform:rotate(360deg); } }
  @keyframes ray-fade-in{ 0%{ opacity:0; } 100%{ opacity:.4; } }
  .dmg-pop{
    position:absolute; top:-6px; left:50%; transform:translateX(-50%);
    font-family:var(--font-mono); font-weight:700; font-size:13px;
    color:#f2d9a8; text-shadow:0 1px 2px #000; pointer-events:none;
    animation:floaty .7s ease-out forwards; z-index:10; white-space:nowrap;
  }
  .dmg-pop.crit{ color:var(--danger); font-size:16px; }
  .dmg-pop.heal{ color:var(--heal); }
  .hpbar-wrap{ width:56px; height:6px; background:#000a; border-radius:3px; margin:4px auto 2px; overflow:hidden; border:1px solid #0006; }
  .hpbar{ height:100%; background:linear-gradient(90deg,#7fbf7f,#4f9f5f); transition:width .25s; }
  .hpbar.low{ background:linear-gradient(90deg,#d97a5a,#b1503a); }
  .unit-label{ font-size:10px; color:var(--ink-faint); }
  .unit-lvl{ font-size:9px; color:var(--ink-faint); }

  .log-strip{
    height:88px; border-top:1px solid var(--line); background:var(--bg-0);
    padding:6px 12px; overflow-y:auto; -webkit-overflow-scrolling:touch; font-size:11.5px; color:var(--ink-faint);
    font-family:var(--font-mono); line-height:1.55;
  }
  .log-strip div{ opacity:.9; }
  .log-strip .lg-gold{ color:var(--gold); }
  .log-strip .lg-rare{ color:var(--r-rare); }
  .log-strip .lg-epic{ color:var(--r-epic); }
  .log-strip .lg-legendary{ color:var(--r-legendary); }
  .log-strip .lg-bad{ color:var(--danger); }
  .log-strip .lg-good{ color:var(--accent-bright); }

  /* ---------- yan panel ---------- */
  .side{ flex:1; display:flex; flex-direction:column; min-width:300px; min-height:0; background:var(--bg-1); }
  .tabs{ display:flex; border-bottom:1px solid var(--line); background:var(--bg-2); padding:0 var(--sp-2); gap:2px; }
  .tab{
    flex:1; padding:9px 2px 8px; text-align:center; font-size:9.5px; color:var(--ink-faint);
    cursor:pointer; letter-spacing:.1px; line-height:1.4;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    border-radius:var(--radius-sm) var(--radius-sm) 0 0;
    position:relative; top:1px;
    transition:color .12s, background .12s;
  }
  .tab-ico{ font-size:15px; filter:grayscale(.4); opacity:.75; transition:filter .12s, opacity .12s; }
  .tab-label{ font-weight:600; }
  .tab:hover{ color:var(--ink-dim); background:var(--bg-3); }
  .tab.active{
    color:var(--accent-bright); background:var(--bg-1);
    box-shadow:inset 0 2px 0 var(--accent);
  }
  .tab.active .tab-ico{ filter:none; opacity:1; }
  .panel{ flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px; display:none; }
  .panel.active{ display:block; }

  .hero-card{
    background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--radius);
    padding:12px 14px; margin-bottom:10px;
    box-shadow:0 1px 0 rgba(0,0,0,.2);
  }
  .hero-card-top{ display:flex; align-items:center; gap:10px; }
  .hero-mini{ background:var(--bg-1); border-radius:var(--radius-sm); padding:4px; }
  .hero-mini svg{ width:34px; height:34px; display:block; }
  .hero-card-name{ font-size:13.5px; font-weight:700; letter-spacing:.1px; }
  .hero-card-role{ font-size:10px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.5px; }
  .hero-card .hpbar-wrap{ width:100%; margin:8px 0 4px; }
  .stat-row{ display:flex; flex-wrap:wrap; gap:6px; font-size:11px; color:var(--ink-dim); margin-top:8px; }
  .stat-chip{ background:var(--bg-1); padding:3px 8px; border-radius:6px; font-weight:600; }
  .equip-row{ display:flex; gap:6px; margin-top:10px; }
  .equip-slot{
    flex:1; border:1px dashed var(--line); border-radius:6px; padding:5px; font-size:9.5px;
    text-align:center; color:var(--ink-faint); min-height:40px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2px;
  }
  .equip-slot.filled{ border-style:solid; background:var(--bg-3); cursor:pointer; transition:filter .12s, transform .08s; }
  .equip-slot.filled:hover{ filter:brightness(1.3); }
  .equip-slot.filled:active{ transform:scale(0.96); }
  .eq-slot-icon{ font-size:16px; line-height:1; }
  .eq-slot-empty-icon{ opacity:.35; font-size:14px; }
  .eq-slot-rarity{ font-size:8.5px; line-height:1.2; }
  .btn{
    background:var(--bg-3); border:1px solid var(--line); color:var(--ink-dim);
    padding:7px 13px; border-radius:var(--radius-sm); font-size:11.5px; font-weight:600; cursor:pointer;
    transition:background .15s, border-color .15s, color .15s, transform .08s;
    display:inline-flex; align-items:center; justify-content:center; gap:5px;
  }
  .btn:hover:not(:disabled){ background:var(--bg-4); border-color:var(--accent-dim); color:var(--ink); }
  .btn:active:not(:disabled){ transform:scale(.97); }
  .btn:disabled{ opacity:.35; cursor:default; }
  .btn.primary{ background:var(--accent-dim); border-color:var(--accent); color:#eafbe8; }
  .btn.primary:hover:not(:disabled){ background:var(--accent); border-color:var(--accent-bright); }
  .btn.small{ padding:4px 10px; font-size:10.5px; }
  .btn.full{ width:100%; margin-top:8px; }

  .recruit-box{
    border:1px dashed var(--line); border-radius:8px; padding:12px; margin-bottom:10px;
    text-align:center; color:var(--ink-faint); font-size:12px;
  }

  .inv-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(58px,1fr)); gap:8px; margin-bottom:10px; }
  .item-slot{
    aspect-ratio:1; border-radius:var(--radius-sm); border:2px solid var(--line); background:var(--bg-2);
    display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer;
    position:relative; transition:filter .12s, transform .08s;
  }
  .item-slot:hover{ filter:brightness(1.25); }
  .item-slot:active{ transform:scale(.94); }
  .item-slot.common{ border-color:var(--r-common); }
  .item-slot.uncommon{ border-color:var(--r-uncommon); box-shadow:0 0 8px -2px var(--r-uncommon); }
  .item-slot.rare{ border-color:var(--r-rare); box-shadow:0 0 10px -2px var(--r-rare); }
  .item-slot.epic{ border-color:var(--r-epic); box-shadow:0 0 12px -1px var(--r-epic); }
  .item-slot.legendary{ border-color:var(--r-legendary); box-shadow:0 0 14px 0 var(--r-legendary); }

  .item-detail{
    background:var(--bg-3); border:1px solid var(--line-soft); border-radius:var(--radius); padding:14px; margin-bottom:12px;
  }
  .item-detail h4{ margin:0 0 4px; font-size:13.5px; font-weight:700; }
  .item-lore{
    font-size:11px; font-style:italic; color:var(--ink-faint); line-height:1.4;
    margin:2px 0 8px; padding-left:8px; border-left:2px solid var(--line);
  }
  .item-detail .stat-row{ margin-top:8px; }
  .item-actions{ display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }

  .chest-box{
    background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--radius); padding:14px; margin-bottom:14px;
    display:flex; align-items:center; gap:12px;
  }
  .chest-box .chest-icon{ font-size:28px; }
  .chest-box .chest-info{ flex:1; font-size:12px; color:var(--ink-dim); }

  .rune-tree{ display:flex; flex-direction:column; gap:8px; }
  .rune-node{
    background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--radius); padding:11px 13px;
    display:flex; align-items:center; gap:10px;
  }
  .rune-node.owned{ border-color:var(--accent-dim); background:#212c22; }
  .rune-node.locked{ opacity:.4; }
  .rune-icon{ font-size:18px; width:26px; text-align:center; }
  .rune-info{ flex:1; }
  .rune-name{ font-size:12.5px; font-weight:700; }
  .rune-desc{ font-size:10.5px; color:var(--ink-faint); }
  .rune-cost{ font-size:11px; color:var(--gold); font-family:var(--font-mono); white-space:nowrap; font-weight:700; }

  .rebirth-lock{ text-align:center; padding:34px 14px; color:var(--ink-faint); font-size:12.5px; line-height:1.6; }
  .rebirth-lock .rl-icon{ font-size:30px; margin-bottom:10px; }
  .rebirth-lock b{ color:var(--ink-dim); }
  .rebirth-box{
    background:linear-gradient(165deg,#241f38,#1d1826); border:1px solid #423a5f; border-radius:var(--radius-lg);
    padding:16px; margin-bottom:18px; text-align:center;
  }
  .rebirth-box p{ font-size:11.5px; color:var(--ink-dim); line-height:1.55; margin:0 0 12px; }
  .rebirth-box .rb-stardust-preview{ font-size:22px; color:#c9a8f0; font-weight:800; margin-bottom:6px; }
  .prestige-node .rune-name b{ color:var(--accent-bright); font-weight:600; font-size:10.5px; }
  .prestige-node .rune-cost{ color:#c9a8f0; }
  .stardust-amt{ color:#c9a8f0; font-family:var(--font-mono); font-weight:700; }

  .section-title{
    font-size:10.5px; text-transform:uppercase; letter-spacing:1.2px; font-weight:700;
    color:var(--ink-faint); margin:20px 0 10px; display:flex; align-items:center; gap:8px;
  }
  .section-title::before{ content:''; width:3px; height:11px; background:var(--accent-dim); border-radius:2px; }
  .section-title:first-child{ margin-top:0; }

  .empty-hint{ font-size:11.5px; color:var(--ink-faint); text-align:center; padding:20px 10px; }

  /* modal */
  .modal-back{
    position:absolute; inset:0; background:#0a0705d9; display:none; align-items:center; justify-content:center; z-index:80;
    backdrop-filter:blur(2px);
  }
  .modal-back.show{ display:flex; }
  .modal{
    background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--radius-lg); padding:24px; width:min(360px,90%);
    text-align:center; box-shadow:0 24px 60px -16px #000000e0;
  }
  .modal h3{ margin:0 0 6px; font-size:16px; font-weight:800; letter-spacing:.2px; }
  .modal p{ font-size:12.5px; color:var(--ink-dim); margin:6px 0 16px; line-height:1.55; }
  .class-pick{ display:flex; gap:10px; justify-content:center; }
  .class-opt{
    flex:1; background:var(--bg-3); border:1px solid var(--line-soft); border-radius:var(--radius); padding:14px 10px; cursor:pointer;
    transition:border-color .15s, transform .1s, background .15s;
  }
  .class-opt:hover{ border-color:var(--accent); background:var(--bg-4); transform:translateY(-2px); }
  .class-opt svg{ width:40px; height:40px; }
  .class-opt div.cn{ font-size:12.5px; margin-top:8px; font-weight:700; }
  .class-opt div.cd{ font-size:10px; color:var(--ink-faint); margin-top:2px; }

  /* profesyonel kuşanma seçim ekranı */
  .equip-picker{ text-align:left; }
  .equip-picker h3{ margin:0; font-size:14px; }
  .ep-item-preview{ display:flex; align-items:center; gap:12px; }
  .ep-item-icon{
    width:44px; height:44px; min-width:44px; border-radius:9px; border:2px solid;
    background:var(--bg-3); display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .ep-hero-list{ display:flex; flex-direction:column; gap:8px; max-height:280px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .ep-hero-option{
    display:flex; align-items:center; gap:10px; background:var(--bg-2); border:1px solid var(--line);
    border-radius:9px; padding:8px 10px; cursor:pointer; transition:background .15s, border-color .15s, transform .1s;
    text-align:left;
  }
  .ep-hero-option:hover{ background:#413630; border-color:var(--accent-dim); }
  .ep-hero-option:active{ transform:scale(0.98); }
  .ep-hero-sprite{ width:38px; height:38px; min-width:38px; display:flex; align-items:center; justify-content:center; }
  .ep-hero-sprite svg{ width:36px; height:36px; }
  .ep-hero-info{ flex:1; min-width:0; }
  .ep-hero-name{ font-size:12.5px; font-weight:600; }
  .ep-hero-lvl{ font-weight:400; color:var(--ink-faint); font-size:10.5px; }
  .ep-hero-current{ font-size:10px; color:var(--ink-faint); margin:1px 0 4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ep-hero-delta{ display:flex; flex-wrap:wrap; gap:5px; }
  .ep-hero-delta .stat-chip{ font-size:10px; padding:1px 6px; }
  .ep-hero-delta .stat-up{ background:#2a4030; color:#8fd99f; }
  .ep-hero-delta .stat-down{ background:#402a2a; color:#e0958a; }
  .ep-hero-delta .ep-nochange{ opacity:.55; }
  .ep-hero-go{ font-size:18px; color:var(--ink-faint); }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:#4a3d34; border-radius:4px; }
  ::-webkit-scrollbar-track{ background:transparent; }

  @media (max-width:720px){
    .main{ flex-direction:column; }
    .stage-view{ border-right:none; border-bottom:1px solid var(--line); min-height:260px; }
    .os-window{ width:98vw; height:96vh; }
    #statStageLabel{ max-width:90px; }
    .statbar{ gap:var(--sp-2); padding:8px var(--sp-3); }
    .wallet{ padding:5px 10px; gap:8px; }
    .stage-pill{ padding:5px 6px 5px 12px; }
    .tab-label{ font-size:9px; }
  }
</style>
</head>
<body>

<div class="os-window" id="osWindow">
  <div class="titlebar">
    <span class="tb-icon" id="tbIcon"></span>
    <span class="tb-title">Brake Time Hero — v0.1 prototip</span>
    <div class="tb-btns">
      <div class="tb-btn tb-min" id="btnMin" title="Küçült">–</div>
      <div class="tb-btn tb-max" id="btnMax" title="Büyüt">▢</div>
      <div class="tb-btn tb-close" id="btnClose" title="Kapat">×</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="loot-toasts" id="lootToasts"></div>

  <div class="statbar">
    <div class="wallet">
      <div class="stat-item"><span class="stat-icon">💰</span><span class="gold-amt" id="statGold">0</span></div>
      <div class="wallet-div"></div>
      <div class="stat-item"><span class="stat-icon">🔷</span><b id="statEssence">0</b></div>
      <div class="wallet-div" id="stardustDiv" style="display:none;"></div>
      <div class="stat-item" id="stardustIndicator" style="display:none;"><span class="stat-icon">✨</span><b id="statStardust">0</b></div>
    </div>
    <div class="spacer"></div>
    <div class="stage-pill">
      <span id="statStageLabel">Aşama 1</span>
      <div class="stage-nav">
        <button id="stagePrev" title="Önceki aşama">◀</button>
        <button id="stageNext" title="Sonraki aşama">▶</button>
        <button id="stageFrontier" title="En ileri aşamaya dön">⇥</button>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="settings-menu">
      <button class="btn small icon-only" id="btnSettingsToggle" title="Ayarlar">⚙</button>
      <div class="settings-dropdown" id="settingsDropdown">
        <div class="stat-item" id="autoOpenIndicator" style="display:none;">⚙️&nbsp;Oto-Açılım Aktif</div>
        <button class="btn" id="btnMute" title="Sesi kapat/aç">🔊&nbsp;Ses</button>
        <button class="btn primary" id="btnInstall" style="display:none;" title="Ana ekrana ekle">📲&nbsp;Ana Ekrana Ekle</button>
        <button class="btn danger-ghost" id="btnReset" title="Kaydı sıfırla">Kaydı Sıfırla</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="stage-view">
      <div class="wave-progress"><div class="wave-progress-fill" id="waveFill"></div></div>
      <div class="boss-banner" id="bossBanner">⚔ PATRON DALGASI ⚔</div>
      <div class="arena">
        <div class="party-row" id="partyRow"></div>
        <div class="enemy-row" id="enemyRow"></div>
      </div>
      <div class="log-strip" id="logStrip"></div>
    </div>

    <div class="side">
      <div class="tabs">

const REBIRTH_MIN_STAGE = 15; // yeniden doğuş bu aşamaya ulaşınca açılır

const PRESTIGE_TREE = [
  { key:'powerLegacy',     name:'Güç Mirası',       desc:'Kalıcı hasar',           icon:'⚔️', baseCost:4, costGrowth:1.18, perLevel:0.02, field:'atkMult' },

function prestigeNodeCost(node){
  const lvl = prestigeLevel(node.key);
  return Math.ceil(node.baseCost * Math.pow(node.costGrowth, lvl));
}

function calcStardustGain(maxStage){
  if(maxStage < REBIRTH_MIN_STAGE) return 0;
  return Math.max(1, Math.floor(Math.pow(maxStage, 1.3)));

let state = null;

function freshState(){

    maxStageReached:1,

    lastSave:Date.now(),

  };
}

function runeOwned(key){ return !!(state.runes && state.runes[key]); }
function runeBonusSum(field){
  let s=0;
  for(const r of RUNES){ if(runeOwned(r.key) && r.effect[field]!==undefined) s+=r.effect[field]; }
  return s;
}
function prestigeLevel(key){ return (state.prestigeLevels && state.prestigeLevels[key]) || 0; }
function prestigeBonusSum(field){
  let s=0;
  for(const node of PRESTIGE_TREE){ if(node.field===field) s += prestigeLevel(node.key)*node.perLevel; }
  return s;
}
function partyAtkMult(){ return 1+runeBonusSum('atkMult')+prestigeBonusSum('atkMult'); }
function partyDefMult(){ return 1+runeBonusSum('defMult')+prestigeBonusSum('defMult'); }
function partyHpMult(){ return 1+runeBonusSum('hpMult')+prestigeBonusSum('hpMult'); }
function goldMult(){ return 1+runeBonusSum('goldMult')+prestigeBonusSum('goldMult'); }
function dropMult(){ return 1+runeBonusSum('dropMult')+prestigeBonusSum('dropMult'); }
function bagBonus(){ return runeBonusSum('bagBonus'); }
function offlineMult(){ return 0.22 + runeBonusSum('offlineMult'); }
function autoOpenActive(){ return runeOwned('autoOpen'); }
function maxUnlockedSlot(){
  let m=1;
  for(const r of RUNES){ if(runeOwned(r.key) && r.effect.unlockSlot) m=Math.max(m,r.effect.unlockSlot); }
  return m;
}

/* ============================================================
   YARDIMCI: KAYIT / YÜKLEME
   İki ortamı da destekler:
   - Claude.ai artifact önizlemesi  -> window.storage (kalıcı, hesaba bağlı)
   - Bağımsız barındırılan / PWA olarak yüklenmiş sürüm -> localStorage
     (window.storage yalnızca Claude'un artifact ortamında var olduğu için,
     kendi sunucunda barındırdığında ya da ana ekrana yüklediğinde otomatik
     olarak localStorage'a düşer.)
============================================================ */

const hasClaudeStorage = (typeof window.storage !== 'undefined') && window.storage && typeof window.storage.get === 'function';

async function saveGame(){
  state.lastSave = Date.now();
  try{
    if(hasClaudeStorage){
      await window.storage.set(SAVE_KEY, JSON.stringify(state), false);
    } else {
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    }
  }catch(e){ console.warn('Kayıt başarısız:', e); }
}

async function loadGame(){
  try{
    if(hasClaudeStorage){
      const res = await window.storage.get(SAVE_KEY, false);
      if(res && res.value){ return JSON.parse(res.value); }
      return null;
    } else {
      const raw = localStorage.getItem(SAVE_KEY);
      return raw ? JSON.parse(raw) : null;
    }
  }catch(e){
    return null; // anahtar yok ya da hata -> ilk kez oynanıyor
  }
}

/* ============================================================
   EŞYA / LOOT ÜRETİMİ
============================================================ */

// Nadirliğe göre isim havuzları — sıradan eşyalar sade, üst nadirlikler

const ITEM_NAME_POOLS = {
  weapon: {
    common:   ['Demir Kılıç','Basit Kama','Ahşap Sopa','Paslı Balta','Taş Baltacık'],
    uncommon: ['Keskin Kılıç','Cilalı Balta','Avcı Kaması','Meşe Yayı','Çelik Hançer'],

const LEGENDARY_UNIQUES = {
  weapon: [
    { name:'Gecenin Ağıdı', lore:'Karanlıkta fısıldayan bir kılıç; her vuruşunda düşmanın gölgesini biraz daha küçültür.' },

  ],
};

function pickItemName(typeKey, rarityIdx){
  if(rarityIdx >= 4){ // Destansı -> benzersiz isim + efsane
    const pool = LEGENDARY_UNIQUES[typeKey];
    const pick = pool[Math.floor(Math.random()*pool.length)];
    return { name: pick.name, lore: pick.lore };
  }
  const tierKey = ['common','uncommon','rare','epic'][rarityIdx] || 'common';
  const pool = ITEM_NAME_POOLS[typeKey][tierKey];
  return { name: pool[Math.floor(Math.random()*pool.length)], lore: null };
}

let itemIdSeq = 1;
function rollRarity(bonusDropLuck){
  // bonusDropLuck yüksek nadirliklere hafif kaydırma sağlar
  const weights = RARITY.map((r,i)=> r.weight * (1 + bonusDropLuck*0.4*i));
  const total = weights.reduce((a,b)=>a+b,0);
  let roll = Math.random()*total;
  for(let i=0;i<RARITY.length;i++){
    if(roll < weights[i]) return i;
    roll -= weights[i];
  }
  return 0;
}

function generateItem(stageLevel){
  const typeDef = ITEM_TYPES[Math.floor(Math.random()*ITEM_TYPES.length)];
  const rIdx = rollRarity(dropMult());
  const rarity = RARITY[rIdx];
  const base = 3 + stageLevel*1.15;
  const stats = { atk:0, def:0, crit:0, hp:0 };
  const mainVal = Math.round(base * rarity.mult * (typeDef.statKey==='crit'?0.02:1) * (typeDef.statKey==='crit'?1:1));
  if(typeDef.statKey==='crit'){
    stats.crit = +(0.01 + 0.008*stageLevel*rarity.mult).toFixed(3);
    stats.hp = Math.round(base*rarity.mult*0.8);
  } else {
    stats[typeDef.statKey] = Math.round(base*rarity.mult*(typeDef.statKey==='def'?0.8:1));
    if(typeDef.statKey==='armor'||typeDef.statKey==='def') stats.hp = Math.round(base*rarity.mult*1.4);
  }
  const picked = pickItemName(typeDef.key, rIdx);
  return {
    id:'it'+(itemIdSeq++),
    type:typeDef.key,
    icon:typeDef.icon,
    rarity:rarity.key,
    rarityIdx:rIdx,
    name: picked.name,
    lore: picked.lore,
    stats,
    bonus:[], // cilalama ile eklenen ekstra hatlar
  };
}

function itemPower(item){
  if(!item) return 0;
  let p = item.stats.atk*2 + item.stats.def*2.4 + item.stats.hp*0.6 + item.stats.crit*140;
  for(const b of item.bonus) p += (b.atk||0)*2 + (b.def||0)*2.4 + (b.hp||0)*0.6 + (b.crit||0)*140;
  return p;
}

/* ============================================================
   KAHRAMAN YARDIMCI FONKSİYONLAR
============================================================ */

function xpToNext(level){ return Math.round(30 * Math.pow(1.28, level-1)); }

function heroClassDef(h){ return CLASS_DEFS[h.cls]; }

function heroTotalStats(h){
  const cd = heroClassDef(h);
  const lvlMult = Math.pow(1.085, h.level-1);
  let atk = cd.baseAtk*lvlMult;
  let def = cd.baseDef*lvlMult;
  let hp  = cd.baseHp*lvlMult;
  let crit = cd.baseCrit;
  for(const slotKey of ['weapon','armor','trinket']){
    const it = h.equip[slotKey];
    if(!it) continue;
    atk += it.stats.atk||0; def += it.stats.def||0; hp += it.stats.hp||0; crit += it.stats.crit||0;
    for(const b of it.bonus){ atk += b.atk||0; def += b.def||0; hp += b.hp||0; crit += b.crit||0; }
  }
  atk *= partyAtkMult(); def *= partyDefMult(); hp *= partyHpMult();
  return { atk:Math.round(atk), def:Math.round(def), hp:Math.round(hp), crit:Math.min(0.75,crit), atkSpeed:cd.atkSpeed };
}

function makeHero(slot, cls){
  return {
    slot, cls, level:1, xp:0,
    hpCur: heroTotalStatsPreview(cls,1),
    equip:{weapon:null, armor:null, trinket:null},
    atkTimer: Math.random()*600,
    healTimer: 1400,
    downed:false,
  };
}
function heroTotalStatsPreview(cls, level){
  const cd = CLASS_DEFS[cls];
  return Math.round(cd.baseHp*Math.pow(1.085,level-1)*partyHpMult());
}

let enemy = null; // {name, hp, hpMax, atk, def, isBoss, atkTimer}
const MONSTER_NAMES = ['Mağara Sıçanı','Çürük Kemik','Küf Kütlesi','Gölge Kırıntısı','Tünel Örümceği','Pas Zırhlı','Kök Canavarı','Kül Ruhu'];
const BOSS_NAMES = ['Zindan Bekçisi','Taş Devi','Kemik Kral','İhanet Gölgesi'];

function spawnEnemy(){
  const st = state.stage;
  const isBoss = state.waveInStage >= STAGE_LEN;
  const scale = Math.pow(1.145, st-1);
  const hpBase = isBoss ? 90*3.2 : 26;
  const atkBase = isBoss ? 5.5*1.2 : 4;
  const name = isBoss ? BOSS_NAMES[(st/1|0)%BOSS_NAMES.length] : MONSTER_NAMES[Math.floor(Math.random()*MONSTER_NAMES.length)];
  enemy = {
    name, isBoss,
    hpMax: Math.round(hpBase*scale + st*4),
    hp: Math.round(hpBase*scale + st*4),
    atk: Math.round(atkBase*scale + st*0.6),
    def: Math.round(1 + st*0.35),
    atkTimer: 500,
  };
  document.getElementById('bossBanner').classList.toggle('show', isBoss);
  renderArena(); // yeni düşman elementinin hemen DOM'da var olmasını garanti eder
}

function pushLog(html){
  const el = document.getElementById('logStrip');
  const div = document.createElement('div');

  el.appendChild(div);
  while(el.children.length>60) el.removeChild(el.firstChild);

}

/* ============================================================
   SES MOTORU — harici dosya YOK. Web Audio API ile her ton anlık
   sentezleniyor (osilatör + zarf), tek dosya felsefesine uygun.
============================================================ */

let audioCtx = null;
function ensureAudioCtx(){
  if(audioCtx) return audioCtx;
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return null;
    audioCtx = new Ctx();
    return audioCtx;
  }catch(e){ return null; }
}
function resumeAudioCtx(){
  const ctx = ensureAudioCtx();
  if(ctx && ctx.state==='suspended' && ctx.resume) ctx.resume().catch(()=>{});
}
function isSoundOn(){ return !(state && state.muted); }

// Tek bir "bip" çalar: freq(başlangıç), duration(sn), type(dalga şekli),
// gain(ses seviyesi), opts.freqTo (varsa perdeyi kaydırır), opts.delay (gecikme, sn).
function playTone(freq, duration, type, gain, opts){
  if(!isSoundOn()) return;
  const ctx = ensureAudioCtx();
  if(!ctx) return;
  opts = opts || {};
  try{
    const t0 = ctx.currentTime + (opts.delay||0);
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, t0);
    if(opts.freqTo) osc.frequency.exponentialRampToValueAtTime(Math.max(20,opts.freqTo), t0+duration);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(gain, t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+duration);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(t0); osc.stop(t0+duration+0.03);
  }catch(e){ /* sessiz geç */ }
}

/* ============================================================
   SVG SPRITE ÜRETİMİ
============================================================ */

// Bir piksel-grid tanımını (satır dizisi + karakter->renk paleti) gerçek
// SVG <rect> öğelerine dönüştürür. Her karakter 1x1 birimlik bir "piksel".
function renderPixelSprite(spriteKey, extraGlow){
  const data = SPRITE_DATA[spriteKey];
  if(!data) return '';
  const rows = data.rows, pal = data.palette;
  const h = rows.length;
  let w = 0;
  for(const r of rows) w = Math.max(w, r.length);
  const glow = extraGlow ? ` filter="drop-shadow(0 0 4px ${extraGlow})"` : '';
  let rects = (spriteKey==='icon') ? '' : `<ellipse cx="${w/2}" cy="${h-0.4}" rx="${w*0.3}" ry="0.7" fill="#000" opacity="0.32"/>`;
  for(let y=0;y<h;y++){
    const r = rows[y];
    for(let x=0;x<r.length;x++){
      const ch = r[x];
      if(ch===' '||!pal[ch]) continue;
      rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="${pal[ch]}"/>`;
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" shape-rendering="crispEdges"${glow}>${rects}</svg>`;
}

function svgUnit(tint, weaponColor, cls, extraGlow){
  return renderPixelSprite(cls, extraGlow);
}

function svgMonster(isBoss){
  return renderPixelSprite(isBoss ? 'boss' : 'monster');
}

// (içindeki <select> ve butonları) her 260ms'de yeniden kurup kullanıcı
// etkileşimini bozmamak için, ayrıca arena birimlerini YENİDEN OLUŞTURMAK yerine
// (ki bu flashUnit ile eklenen 'attack'/'cast'/'hit' animasyon sınıflarını
// boyanmadan önce silerdi) sadece can barlarını/etiketleri günceller.
function renderFrame(){
  renderStatbar();
  updateArenaVitals();
  renderHeroCards();
}

// Mevcut arena DOM elemanlarını YOK ETMEDEN can barı genişliğini ve
// 'down' durumunu günceller — böylece flashUnit ile eklenen geçici
// animasyon sınıfları (attack/cast/hit) bir sonraki tick'e kadar hayatta kalır.
function updateArenaVitals(){
  for(const h of state.heroes){
    const unit = document.getElementById('unit-hero-'+h.slot);
    if(!unit) continue;
    const stats = heroTotalStats(h);
    const hpPct = Math.max(0, h.hpCur/stats.hp*100);
    const bar = unit.querySelector('.hpbar');
    if(bar){ bar.style.width = hpPct+'%'; bar.classList.toggle('low', hpPct<30); }
    unit.classList.toggle('down', !!h.downed);
  }
  if(enemy){
    const eunit = document.getElementById('unit-enemy');
    if(eunit){
      const hpPct = Math.max(0, enemy.hp/enemy.hpMax*100);
      const bar = eunit.querySelector('.hpbar');
      if(bar){ bar.style.width = hpPct+'%'; bar.classList.toggle('low', hpPct<30); }
    }
  }
}

let lastAppliedThemeIdx = -1;
function applyStageThemeIfNeeded(stage){
  const idx = Math.floor((stage-1)/5) % STAGE_THEMES.length;
  if(idx === lastAppliedThemeIdx) return;
  lastAppliedThemeIdx = idx;
  const el = document.querySelector('.stage-view');
  if(el) el.style.background = STAGE_THEMES[idx].bg;
}

function renderStatbar(){
  document.getElementById('statGold').textContent = Math.floor(state.gold).toLocaleString('tr-TR');
  document.getElementById('statEssence').textContent = state.essence;
  const stardustEl = document.getElementById('stardustIndicator');
  const stardustDiv = document.getElementById('stardustDiv');
  if(state.stardust>0 || state.totalRebirths>0){
    stardustEl.style.display = 'flex';

    document.getElementById('statStardust').textContent = state.stardust;
  } else {
    stardustEl.style.display = 'none';
    if(stardustDiv) stardustDiv.style.display = 'none';
  }
  const theme = stageThemeFor(state.stage);
  document.getElementById('statStageLabel').textContent = `Aşama ${state.stage} · ${theme.name}`;
  applyStageThemeIfNeeded(state.stage);
  document.getElementById('stagePrev').disabled = state.stage<=1;
  document.getElementById('stageNext').disabled = state.stage>=state.maxStageReached;
  document.getElementById('autoOpenIndicator').style.display = autoOpenActive() ? 'flex' : 'none';
  document.getElementById('waveFill').style.width = (Math.min(state.waveInStage,STAGE_LEN)/STAGE_LEN*100)+'%';

  if(muteBtn) muteBtn.textContent = state.muted ? '🔇' : '🔊';
}

// Bir kahramanın en yüksek nadirlikteki ekipmanına göre parıltı rengi döner.
// Sadece Ender ve üzeri için (çok sık/gürültülü olmasın diye) bir renk döner.
function heroBestRarityGlow(h){
  let best = -1;
  for(const sk of ['weapon','armor','trinket']){
    const it = h.equip[sk];
    if(it && it.rarityIdx > best) best = it.rarityIdx;
  }
  if(best < 2) return null;
  return RARITY[best].color;
}

function renderRecruitBoxes(){
  const wrap = document.getElementById('recruitBoxes');
  wrap.innerHTML = '';
  const maxSlot = maxUnlockedSlot();
  const usedClasses = state.heroes.map(h=>h.cls);
  for(let slot=state.heroes.length+1; slot<=maxSlot; slot++){
    const box = document.createElement('div');
    box.className = 'recruit-box';
    const options = CLASS_ORDER.filter(c=>!usedClasses.includes(c));
    if(options.length===0){ box.textContent='Tüm sınıflar alındı.'; wrap.appendChild(box); continue; }
    box.innerHTML = `<div style="margin-bottom:8px;">Slot ${slot} boş — bir kahraman işe al:</div>
      <div style="display:flex; gap:6px; flex-wrap:wrap; justify-content:center;">
      ${options.map(c=>`<button class="btn small recruit-btn" data-cls="${c}" data-slot="${slot}">${CLASS_DEFS[c].name} (${CLASS_DEFS[c].recruitCost}💰)</button>`).join('')}
      </div>`;
    wrap.appendChild(box);
  }
  if(maxSlot <= state.heroes.length){
    const hint = document.createElement('div');
    hint.className='empty-hint';
    hint.textContent = state.heroes.length>=4 ? 'Tüm slotlar dolu.' : 'Yeni slot açmak için Rün Ağacı sekmesine bak.';
    wrap.appendChild(hint);
  }
  wrap.querySelectorAll('.recruit-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cls = btn.dataset.cls, slot = +btn.dataset.slot;
      const cost = CLASS_DEFS[cls].recruitCost;
      if(state.gold < cost){ showToast('Yeterli altının yok.'); return; }
      state.gold -= cost;
      state.heroes.push(makeHero(slot, cls));
      pushLog(`<span class="lg-good">${CLASS_DEFS[cls].name} partiye katıldı.</span>`);
      render(); saveGame();
    });
  });
}

      </div>

  document.getElementById('btnEquip').addEventListener('click', ()=>{
    showEquipPickerModal(it);
  });

    if(state.gold<60 || state.essence<2){ showToast('Yeterli altın/öz yok.'); return; }
    state.gold-=60; state.essence-=2;
    const keys=['atk','def','hp','crit'];
    const k = keys[Math.floor(Math.random()*keys.length)];
    const val = k==='crit' ? +(0.01+Math.random()*0.02).toFixed(3) : Math.round((2+Math.random()*4)*RARITY[it.rarityIdx].mult);
    it.bonus.push({[k]:val});
    pushLog(`<span class="lg-rare">'${it.name}' cilalandı: ${bonusLabel({[k]:val})}</span>`);
    render(); saveGame();
  });
  document.getElementById('btnSell').addEventListener('click', ()=>{
    const val = Math.round(20*RARITY[it.rarityIdx].mult);
    state.gold += val;
    state.inventory = state.inventory.filter(i=>i.id!==it.id);
    selectedItemId = null;
    pushLog(`<span class="lg-gold">'${it.name}' satıldı (+${val}💰)</span>`);
    render(); saveGame();
  });
}

/* ============================================================
   PROFESYONEL KUŞANMA SEÇİM EKRANI
   Her kahramanı gerçek sprite'ı, seviyesi, o slotta şu an ne takılı
   olduğu ve yeni eşyanın getireceği net stat farkıyla (yeşil/kırmızı)
   birlikte gösteren bir seçim modalı.
============================================================ */

function itemStatTotal(item){
  const t = {atk:0, def:0, hp:0, crit:0};
  if(!item) return t;
  t.atk = item.stats.atk||0; t.def = item.stats.def||0; t.hp = item.stats.hp||0; t.crit = item.stats.crit||0;
  for(const b of item.bonus){ t.atk+=b.atk||0; t.def+=b.def||0; t.hp+=b.hp||0; t.crit+=b.crit||0; }
  return t;
}

function statDeltaChips(oldItem, newItem){
  const o = itemStatTotal(oldItem), n = itemStatTotal(newItem);
  const defs = [
    {key:'atk', icon:'⚔'}, {key:'def', icon:'🛡'}, {key:'hp', icon:'❤'}, {key:'crit', icon:'✦', pct:true}
  ];
  const chips = [];
  for(const d of defs){
    const delta = n[d.key]-o[d.key];
    const threshold = d.pct ? 0.0009 : 0.4;
    if(Math.abs(delta) < threshold) continue;
    const cls = delta>0 ? 'stat-up' : 'stat-down';
    const arrow = delta>0 ? '▲' : '▼';
    const shown = d.pct ? Math.round(Math.abs(delta)*100)+'%' : Math.round(Math.abs(delta));
    chips.push(`<span class="stat-chip ${cls}">${d.icon} ${arrow}${shown}</span>`);
  }
  return chips.length ? chips.join('') : `<span class="stat-chip ep-nochange">fark yok</span>`;
}

function renderPrestige(){
  const wrap = document.getElementById('prestigeContent');
  if(!wrap) return;
  const eligibleNow = state.maxStageReached >= REBIRTH_MIN_STAGE;
  const hasProgress = state.totalRebirths > 0 || state.stardust > 0;

  // Hiç ilerleme yok ve şu an da uygun değilsen: harcayacak bir şey olmadığı
  // için tamamen kilitli görünümü göster.
  if(!eligibleNow && !hasProgress){
    wrap.innerHTML = `
      <div class="rebirth-lock">

      </div>`;
    return;
  }

  let html = '';
  if(eligibleNow){
    const preview = calcStardustGain(state.maxStageReached);
    html += `
      <div class="rebirth-box">
        <div class="rb-stardust-preview">✨ +${preview}</div>
        <p>Yeniden doğarsan altının, kahramanların ve envanterin sıfırlanır — ama en yüksek

        aşağıdaki mirasları güçlendirmek için kullanılır. Rün Ağacı da sıfırlanır, ama miraslar asla silinmez.</p>
        <button class="btn primary full" id="btnRebirth">Yeniden Doğ</button>
      </div>`;
  } else {
    // Daha önce en az bir kez doğmuş ama bu turda henüz eşiğe ulaşmamış:
    // yine de mirasları harcayabilsin diye ağacı gösteriyoruz, sadece
    // yeniden doğuş butonunu küçük bir hatırlatmayla değiştiriyoruz.
    html += `
      <div class="rebirth-lock" style="padding:16px 12px; margin-bottom:4px;">
        🔒 Bir sonraki Yeniden Doğuş için <b>Aşama ${REBIRTH_MIN_STAGE}</b>'e ulaş
        (şu anki en yüksek aşaman: <b>${state.maxStageReached}</b>)
      </div>`;
  }

  html += `
    <div class="section-title">Yıldız Tozu: <span class="stardust-amt">✨ ${state.stardust}</span> — Kalıcı Miraslar</div>
    <div style="font-size:10.5px;color:var(--ink-faint);margin:-4px 0 10px;">Toplam yeniden doğuş: ${state.totalRebirths} · Tüm zamanların en yüksek aşaması: ${Math.max(state.lifetimeMaxStage||1, state.maxStageReached)}</div>
    <div class="rune-tree" id="prestigeTree">
  `;
  for(const node of PRESTIGE_TREE){
    const lvl = prestigeLevel(node.key);
    const cost = prestigeNodeCost(node);
    const canAfford = state.stardust >= cost;
    const curPct = Math.round(lvl*node.perLevel*100);
    const nextPct = Math.round((lvl+1)*node.perLevel*100);
    html += `
      <div class="rune-node prestige-node">
        <div class="rune-icon">${node.icon}</div>
        <div class="rune-info">
          <div class="rune-name">${node.name} <b>Sv.${lvl}</b></div>
          <div class="rune-desc">${node.desc} +%${curPct} → +%${nextPct}</div>
        </div>
        <div class="rune-cost">✨${cost}</div>
        <button class="btn small ${canAfford?'primary':''}" ${canAfford?'':'disabled'} data-prestige="${node.key}">Yükselt</button>
      </div>`;
  }
  html += `</div>`;
  wrap.innerHTML = html;

  const rebirthBtn = document.getElementById('btnRebirth');
  if(rebirthBtn) rebirthBtn.addEventListener('click', showRebirthConfirmModal);

  wrap.querySelectorAll('button[data-prestige]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const node = PRESTIGE_TREE.find(n=>n.key===btn.dataset.prestige);
      const cost = prestigeNodeCost(node);
      if(state.stardust < cost){ showToast('Yeterli Yıldız Tozu yok.'); return; }
      state.stardust -= cost;
      state.prestigeLevels[node.key] = prestigeLevel(node.key)+1;
      pushLog(`<span class="lg-rare">${node.name} yükseltildi: Sv.${prestigeLevel(node.key)}</span>`);
      sfxPurchase();
      render(); saveGame();
    });
  });
}

function performRebirth(){
  const gain = calcStardustGain(state.maxStageReached);
  const keptStardust = state.stardust + gain;
  const keptPrestigeLevels = state.prestigeLevels;
  const keptTotalRebirths = (state.totalRebirths||0) + 1;
  const keptLifetimeMaxStage = Math.max(state.lifetimeMaxStage||1, state.maxStageReached);
  const keptMuted = state.muted;

  const fresh = freshState();
  fresh.stardust = keptStardust;
  fresh.prestigeLevels = keptPrestigeLevels;
  fresh.totalRebirths = keptTotalRebirths;
  fresh.lifetimeMaxStage = keptLifetimeMaxStage;
  fresh.muted = keptMuted;

  state = fresh;
  enemy = null;
  hideModal();
  sfxRebirth();
  pushLog(`<span class="lg-good">✨ Yeniden doğdun! +${gain} Yıldız Tozu kazandın. (Toplam yeniden doğuş: ${keptTotalRebirths})</span>`);
  showClassPickModal();
  spawnEnemy();
  render();
  saveGame();
}

============================================================ */

function arenaPoint(elId){
  const arena = document.querySelector('.arena');
  const el = document.getElementById(elId);
  if(!arena || !el) return {x:0,y:0};
  return relPoint(arena, el);
}

function relPoint(container, el){
  if(!container || !el) return {x:0,y:0};
  const cr = container.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  return { x: er.left + er.width/2 - cr.left, y: er.top + er.height/2 - cr.top };
}

function spawnParticlesIn(container, x, y, color, count){
  if(!container) return;
  count = count || 7;
  for(let i=0;i<count;i++){
    const ang = Math.random()*Math.PI*2;
    const dist = 18 + Math.random()*26;
    const dx = Math.cos(ang)*dist, dy = Math.sin(ang)*dist;
    const size = 3 + Math.random()*3;
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = x+'px'; p.style.top = y+'px';
    p.style.width = size+'px'; p.style.height = size+'px';
    p.style.background = color;
    p.style.setProperty('--dx', dx+'px');
    p.style.setProperty('--dy', dy+'px');
    container.appendChild(p);
    setTimeout(()=>p.remove(), 520);
  }
}

function spawnParticles(x, y, color, count){
  spawnParticlesIn(document.querySelector('.arena'), x, y, color, count);
}

   MENZİLLİ SALDIRI MERMİLERİ (ok / büyü)
============================================================ */

function projectileMarkup(kind){
  if(kind==='arrow'){
    return `<svg viewBox="0 0 22 6" width="22" height="6">
      <line x1="1" y1="3" x2="18" y2="3" stroke="#caa15c" stroke-width="1.6"/>
      <path d="M18 0 L22 3 L18 6 Z" fill="#e8cba0"/>
      <path d="M1 1 L4 3 L1 5" stroke="#8a6a3c" stroke-width="1" fill="none"/>
    </svg>`;
  }
  return `<svg viewBox="0 0 16 16" width="16" height="16">
    <circle cx="8" cy="8" r="6.5" fill="#b98be0" opacity="0.35"/>
    <circle cx="8" cy="8" r="3.4" fill="#e2c8f7"/>
    <circle cx="8" cy="8" r="1.6" fill="#fff"/>
  </svg>`;
}

// fromId'den toId'ye doğru bir mermi yollar; mermi hedefe ulaştığında
// onArrive() çağrılır (hasar o anda uygulanır) ve mermi kaldırılır.
function spawnProjectile(fromId, toId, kind, onArrive){
  const arena = document.querySelector('.arena');
  if(!arena){ onArrive(); return; }
  const from = arenaPoint(fromId), to = arenaPoint(toId);
  const el = document.createElement('div');
  el.className = 'projectile '+kind;
  el.innerHTML = projectileMarkup(kind);
  const angle = Math.atan2(to.y-from.y, to.x-from.x) * 180/Math.PI;
  el.style.left = from.x+'px'; el.style.top = from.y+'px';
  el.style.transform = `translate(-50%,-50%) rotate(${kind==='arrow'?angle:0}deg)`;
  el.style.transition = 'left .26s linear, top .26s linear';
  arena.appendChild(el);
  // bir sonraki frame'de hedefe doğru geçiş başlat
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      el.style.left = to.x+'px'; el.style.top = to.y+'px';
    });
  });
  setTimeout(()=>{
    el.remove();
    onArrive();
  }, 270);
}

============================================================ */

let tickHandle = null;

function gameTick(){
  if(!enemy) spawnEnemy();
  let allDown = state.heroes.length>0 && state.heroes.every(h=>h.downed);
  if(allDown){
    // parti dağıldı -> kısa süre sonra yeniden canlan
    if(!gameTick._reviving){
      gameTick._reviving = true;
      pushLog(`<span class="lg-bad">Parti dağıldı! Yeniden toparlanıyor...</span>`);
      sfxWipe();
      setTimeout(()=>{
        for(const h of state.heroes){
          const stats = heroTotalStats(h);
          h.hpCur = Math.round(stats.hp*0.5);
          h.downed = false;
        }
        gameTick._reviving = false;
        renderFrame();
      }, 1400);
    }
    renderFrame();
    return;
  }

  for(const h of state.heroes){
    if(h.downed) continue;
    const stats = heroTotalStats(h);
    h.atkTimer -= TICK_MS;
    if(h.atkTimer<=0){
      h.atkTimer = 1000/stats.atkSpeed;
      if(enemy){
        const isCrit = Math.random() < stats.crit;
        let dmg = Math.max(1, Math.round((stats.atk - enemy.def*0.5) * (isCrit?1.8:1)));
        const heroElId = 'unit-hero-'+h.slot;
        const isRanged = (h.cls==='ranger' || h.cls==='mage');
        if(isRanged){
          // ok/büyü mermisi hedefe uçar, hasar mermi vardığında uygulanır
          flashUnit(heroElId, 'cast');
          const kind = h.cls==='ranger' ? 'arrow' : 'bolt';
          const targetEnemy = enemy;
          spawnProjectile(heroElId, 'unit-enemy', kind, ()=>{
            if(!targetEnemy || enemy!==targetEnemy) return; // düşman artık geçersiz (öldü/değişti)
            enemy.hp -= dmg;
            flashUnit('unit-enemy','hit');
            popDamage('unit-enemy', dmg, isCrit?'crit':'');
            const pt = arenaPoint('unit-enemy');
            spawnParticles(pt.x, pt.y, isCrit?'#ff6b52':'#f2d9a8', isCrit?11:6);
            screenShake(isCrit?'lg':'sm');
            sfxHit(isCrit);
            if(enemy.hp<=0){ onEnemyDefeated(); } else { updateArenaVitals(); }
          });
        } else {
          // yakın dövüş: hasar anında uygulanır
          enemy.hp -= dmg;
          flashUnit(heroElId,'attack');
          popDamage('unit-enemy', dmg, isCrit?'crit':'');
          flashUnit('unit-enemy','hit');
          const pt = arenaPoint('unit-enemy');
          spawnParticles(pt.x, pt.y, isCrit?'#ff6b52':'#f2d9a8', isCrit?11:6);
          screenShake(isCrit?'lg':'sm');
          sfxHit(isCrit);
          if(enemy.hp<=0){ onEnemyDefeated(); return; }
        }
      }
    }
    if(heroClassDef(h).heal){
      h.healTimer -= TICK_MS;
      if(h.healTimer<=0){
        h.healTimer = 2600;
        let lowest=null, lowestPct=1;
        for(const hh of state.heroes){
          if(hh.downed) continue;
          const st2 = heroTotalStats(hh);
          const pct = hh.hpCur/st2.hp;
          if(pct<lowestPct){ lowestPct=pct; lowest=hh; }
        }
        if(lowest && lowestPct<0.95){
          const healAmt = Math.round(stats.atk*1.6);
          const st2 = heroTotalStats(lowest);
          lowest.hpCur = Math.min(st2.hp, lowest.hpCur+healAmt);
          popDamage('unit-hero-'+lowest.slot, '+'+healAmt, 'heal');
        }
      }
    }
  }

  if(enemy){
    enemy.atkTimer -= TICK_MS;
    if(enemy.atkTimer<=0){
      enemy.atkTimer = 900;
      const alive = state.heroes.filter(h=>!h.downed);
      if(alive.length>0){
        const tank = alive.find(h=>h.cls==='knight') || alive[Math.floor(Math.random()*alive.length)];
        const stats = heroTotalStats(tank);
        const dmg = Math.max(1, Math.round(enemy.atk - stats.def*0.5));
        tank.hpCur -= dmg;
        flashUnit('unit-enemy','attack');
        popDamage('unit-hero-'+tank.slot, dmg, '');
        flashUnit('unit-hero-'+tank.slot,'hit');
        const pt = arenaPoint('unit-hero-'+tank.slot);
        spawnParticles(pt.x, pt.y, '#c1594a', tank.hpCur<=0?10:5);
        screenShake(tank.hpCur<=0?'lg':'sm');
        sfxTakeDamage();
        if(tank.hpCur<=0){ tank.hpCur=0; tank.downed=true; pushLog(`<span class="lg-bad">${CLASS_DEFS[tank.cls].name} yere düştü!</span>`); }
      }
    }
  }

  renderFrame();
}

function onEnemyDefeated(){
  const wasBoss = enemy.isBoss;
  const goldGain = Math.round((wasBoss? 40:8) * Math.pow(1.1,state.stage-1) * goldMult());
  state.gold += goldGain;
  pushLog(`<span class="lg-gold">${enemy.name} yenildi (+${goldGain}💰)</span>`);
  if(wasBoss) sfxBossVictory(); else sfxGold();

  // XP dağıt
  for(const h of state.heroes){
    if(h.downed) continue;
    h.xp += wasBoss? 20:6;
    const need = xpToNext(h.level);
    if(h.xp>=need){
      h.xp -= need; h.level++;
      const stats = heroTotalStats(h);
      h.hpCur = stats.hp;
      pushLog(`<span class="lg-good">${CLASS_DEFS[h.cls].name} seviye atladı: Sv.${h.level}</span>`);
      celebrateLevelUp(h);
    }
  }

  // sandık şansı
  const chestChance = (wasBoss? 0.9 : 0.16) * dropMult();
  if(Math.random() < chestChance || wasBoss){
    if(autoOpenActive()){
      const result = openOneChest(true);
      if(!result.autoSold) showLootToast(result.item);
    } else {
      state.chestCount++;
      pushLog(`<span class="lg-rare">Bir sandık düştü! (Envanter sekmesinden aç)</span>`);
    }
  }
  // ender materyal: öz
  if(Math.random()<0.35) state.essence += wasBoss?3:1;

  if(wasBoss){
    state.stage++;
    state.maxStageReached = Math.max(state.maxStageReached, state.stage);
    state.waveInStage = 0;
    pushLog(`<span class="lg-good">Aşama ${state.stage}'e ilerlendi!</span>`);
  } else {
    state.waveInStage++;
  }
  enemy = null;
  spawnEnemy();
  saveGame();
  render();
}

function openOneChest(silent){
  const item = generateItem(state.stage);
  const cap = state.inventoryCap + bagBonus();
  const result = { item, autoSold:false, sellVal:0 };
  if(state.inventory.length >= cap){
    const val = Math.round(15*RARITY[item.rarityIdx].mult);
    state.gold += val;
    result.autoSold = true; result.sellVal = val;
    if(!silent) pushLog(`<span class="lg-gold">Envanter dolu, '${item.name}' otomatik satıldı (+${val}💰)</span>`);
  } else {
    state.inventory.push(item);
    const cls = item.rarityIdx>=4?'lg-legendary':(item.rarityIdx>=3?'lg-epic':(item.rarityIdx>=2?'lg-rare':''));
    pushLog(`<span class="${cls}">Sandıktan çıktı: ${item.name}</span>`);
  }
  if(state.chestCount>0) state.chestCount--;
  return result;
}

============================================================ */

let deferredInstallPrompt = null;
const btnInstall = document.getElementById('btnInstall');

function isStandaloneDisplay(){
  return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
}
function isIOSDevice(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}

function updateInstallButton(){
  if(isStandaloneDisplay()){ btnInstall.style.display = 'none'; return; }
  if(deferredInstallPrompt || isIOSDevice()){ btnInstall.style.display = 'inline-flex'; }
  else { btnInstall.style.display = 'none'; }
}

// Chrome/Edge/Android: tarayıcı yükleme kriterlerini karşıladığında bu olayı ateşler.
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  updateInstallButton();
});

window.addEventListener('appinstalled', ()=>{
  deferredInstallPrompt = null;
  btnInstall.style.display = 'none';
  showToast('Brake Time Hero ana ekrana eklendi! 🎉');
});

btnInstall.addEventListener('click', async ()=>{
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    const choice = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    if(choice && choice.outcome==='accepted'){ btnInstall.style.display='none'; }
  } else if(isIOSDevice()){
    // Safari programatik yükleme istemini desteklemiyor — elle adımları göster.
    showModal(`
      <h3>Ana Ekrana Ekle</h3>
      <p>Safari'de alttaki (ya da adres çubuğundaki) <b>Paylaş</b> simgesine
      (kare içinde yukarı ok) dokun, açılan listeden <b>"Ana Ekrana Ekle"</b>
      seçeneğini seç.</p>
      <button class="btn primary full" id="btnCloseInstallInfo">Anladım</button>
    `);
    const btn = document.getElementById('btnCloseInstallInfo');
    if(btn) btn.addEventListener('click', hideModal);
  } else {
    showToast('Bu tarayıcı otomatik yüklemeyi desteklemiyor olabilir. Tarayıcı menüsünden "Ana ekrana ekle" seçeneğine bakabilirsin.');
  }
});

updateInstallButton();

function buildManifest(){
  const pageUrl = location.href.split('#')[0].split('?')[0];
  const scopeUrl = pageUrl.substring(0, pageUrl.lastIndexOf('/')+1) || pageUrl;
  const manifest = {
    name: 'Brake Time Hero',
    short_name: 'Brake Time',
    description: 'Görev çubuğu yerine kendi penceresinde çalışan, otomatik dövüşen bir idle RPG.',
    start_url: pageUrl,
    id: pageUrl,
    scope: scopeUrl,
    display: 'standalone',
    orientation: 'any',
    background_color: '#161210',
    theme_color: '#161210',
    lang: 'tr',
    icons: [
      { src: 'data:image/png;base64,'+ICON_PNG_192_B64, sizes: '192x192', type: 'image/png', purpose: 'any' },
      { src: 'data:image/png;base64,'+ICON_PNG_512_B64, sizes: '512x512', type: 'image/png', purpose: 'any' },
      { src: 'data:image/png;base64,'+ICON_PNG_512_MASKABLE_B64, sizes: '512x512', type: 'image/png', purpose: 'maskable' }
    ]
  };
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
  document.head.appendChild(link);
}

/* ============================================================
   BAŞLATMA
============================================================ */

async function init(){
  // başlık çubuğu ikonu + favicon (aynı piksel-sprite verisinden üretilir)
  const iconSvg = renderPixelSprite('icon');
  const tbIconEl = document.getElementById('tbIcon');
  if(tbIconEl) tbIconEl.innerHTML = iconSvg;
  const favLink = document.createElement('link');
  favLink.rel = 'icon';
  favLink.type = 'image/svg+xml';
  favLink.href = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);
  document.head.appendChild(favLink);
  buildManifest();

  const loaded = await loadGame();
  if(loaded){
    state = loaded;
    // eski kayıtlarla uyumluluk için eksik alanları tamamla
    const fresh = freshState();
    for(const k in fresh){ if(state[k]===undefined) state[k]=fresh[k]; }
    for(const h of state.heroes){ if(h.downed===undefined) h.downed=false; if(h.healTimer===undefined) h.healTimer=1400; }
  } else {
    state = freshState();
  }

  if(!state.started || state.heroes.length===0){
    render();
    showClassPickModal();
  } else {
    // çevrimdışı ilerleme hesapla
    const elapsed = Math.min(MAX_OFFLINE_SECONDS, Math.max(0, Math.floor((Date.now()-state.lastSave)/1000)));
    if(elapsed > 60){
      const avgGoldPerSec = 0.9 * Math.pow(1.06, state.stage-1);
      const gained = Math.round(elapsed * avgGoldPerSec * offlineMult());
      state.gold += gained;
      render();
      showOfflineModal(elapsed, gained);
    } else {
      render();
    }
  }

  spawnEnemy();
  render();
  tickHandle = setInterval(gameTick, TICK_MS);
  setInterval(saveGame, 10000);
  window.addEventListener('beforeunload', ()=>{ saveGame(); });
}

init();

})();
