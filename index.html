<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brake Time Hero</title>
<style>
  :root{
    --bg-0:#161210;
    --bg-1:#1f1a16;
    --bg-2:#2a2320;
    --bg-3:#352c27;
    --line:#4a3d34;
    --ink:#ece2d0;
    --ink-dim:#b7a894;
    --ink-faint:#7d6f60;
    --accent:#7fa384;
    --accent-dim:#54705a;
    --accent-bright:#a8caa0;
    --gold:#e0a545;
    --danger:#c1594a;
    --heal:#6fa593;
    --r-common:#9a9088;
    --r-uncommon:#5fbf6f;
    --r-rare:#5b9de0;
    --r-epic:#b876e0;
    --r-legendary:#e0a545;
    --radius:10px;
    --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-mono: 'Consolas', 'SFMono-Regular', Menlo, monospace;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(ellipse at 50% -10%, #2b241f 0%, #100d0b 70%);
    color:var(--ink);
    font-family:var(--font-display);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--accent-dim); }

  /* ---------- pencere çerçevesi ---------- */
  .os-window{
    position:relative;
    width:min(980px, 96vw);
    height:min(680px, 94vh);
    background:var(--bg-1);
    border-radius:12px;
    border:1px solid #000;
    box-shadow: 0 30px 70px -20px rgba(0,0,0,.7), 0 0 0 1px #3a3128 inset;
    display:flex; flex-direction:column;
    overflow:hidden;
    transition: height .35s cubic-bezier(.4,0,.2,1), box-shadow .35s;
  }
  .os-window.minimized{ height:46px; }
  .titlebar{
    height:34px; min-height:34px;
    background:linear-gradient(180deg,#2c2520,#221c18);
    border-bottom:1px solid #000;
    display:flex; align-items:center;
    padding:0 8px 0 12px;
    gap:8px;
    -webkit-user-select:none; user-select:none;
    cursor:default;
  }
  .titlebar .tb-icon{ display:flex; align-items:center; filter:saturate(1.2); }
  .titlebar .tb-icon svg{ width:16px; height:16px; display:block; }
  .titlebar .tb-title{ font-size:12.5px; color:var(--ink-dim); letter-spacing:.3px; flex:1; }
  .tb-btns{ display:flex; gap:6px; }
  .tb-btn{
    width:13px; height:13px; border-radius:50%; border:1px solid rgba(0,0,0,.4);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:8px; color:transparent;
  }
  .tb-btn:hover{ color:rgba(0,0,0,.55); }
  .tb-min{ background:#d9a441; }
  .tb-max{ background:#6fa572; }
  .tb-close{ background:#c1594a; }

  .toast{
    position:absolute; left:50%; top:44px; transform:translateX(-50%);
    background:#000000cc; color:var(--ink); border:1px solid var(--line);
    padding:8px 14px; border-radius:8px; font-size:12.5px; z-index:50;
    pointer-events:none; opacity:0; transition:opacity .25s, top .25s;
  }
  .toast.show{ opacity:1; top:52px; }

  /* ---------- üst istatistik çubuğu ---------- */
  .statbar{
    display:flex; align-items:center; gap:18px;
    padding:8px 16px; background:var(--bg-2); border-bottom:1px solid var(--line);
    font-size:12.5px; color:var(--ink-dim);
  }
  .statbar b{ color:var(--ink); font-weight:600; }
  .stat-item{ display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .stat-icon{ font-size:13px; }
  .gold-amt{ color:var(--gold); font-family:var(--font-mono); font-weight:700; }
  .statbar .spacer{ flex:1; }
  .stage-pill{
    background:var(--bg-3); border:1px solid var(--line); border-radius:20px;
    padding:4px 12px; font-size:12px; display:flex; align-items:center; gap:8px;
  }
  .stage-nav{ display:flex; gap:4px; }
  .stage-nav button{
    width:20px; height:20px; border-radius:5px; border:1px solid var(--line);
    background:var(--bg-2); color:var(--ink-dim); cursor:pointer; font-size:11px; line-height:1;
  }
  .stage-nav button:hover:not(:disabled){ background:var(--bg-3); color:var(--ink); }
  .stage-nav button:disabled{ opacity:.3; cursor:default; }

  /* ---------- ana içerik ---------- */
  .main{ flex:1; display:flex; min-height:0; }
  .stage-view{
    flex:1.35; position:relative; display:flex; flex-direction:column;
    background:
      radial-gradient(ellipse at 50% 120%, #241d17 0%, transparent 60%),
      repeating-linear-gradient(90deg, #1c1713 0 40px, #1a1512 40px 80px);
    border-right:1px solid var(--line);
    overflow:hidden;
  }
  .boss-banner{
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    background:linear-gradient(180deg,#5a2c26,#3a1c18); border:1px solid #7a3c33;
    color:#f0c9a8; font-size:11px; padding:3px 12px; border-radius:6px; letter-spacing:.5px;
    opacity:0; transition:opacity .3s; pointer-events:none; z-index:5;
  }
  .boss-banner.show{ opacity:1; }
  .wave-progress{
    position:absolute; top:10px; left:12px; right:12px; height:4px;
    background:#000a; border-radius:3px; overflow:hidden; z-index:5;
  }
  .wave-progress-fill{ height:100%; background:var(--accent); transition:width .3s; }

  .arena{ flex:1; position:relative; display:flex; align-items:flex-end; justify-content:space-between; padding:24px 30px 34px; }
  .party-row, .enemy-row{ display:flex; gap:14px; align-items:flex-end; }
  .unit{ position:relative; width:64px; text-align:center; }
  .unit svg{ width:56px; height:56px; overflow:visible; }
  .unit.idle svg{ animation:bob 1.6s ease-in-out infinite; }
  .unit.attack svg{ animation:lunge-hero .28s ease-out; }
  .unit.enemy.attack svg{ animation:lunge-enemy .28s ease-out; }
  .unit.cast svg{ animation:cast-pulse .3s ease-out; }
  .unit.hit svg{ animation:flash .22s ease-out; }
  .unit.down svg{ opacity:.25; filter:grayscale(1); transform:rotate(90deg) translateY(6px); }
  .unit.recruit-slot{ opacity:.5; }
  .unit.boss{ transform:scale(1.32); transform-origin:50% 100%; }
  @keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes lunge-hero{ 0%{transform:translateX(0)} 40%{transform:translateX(10px) scale(1.04)} 100%{transform:translateX(0)} }
  @keyframes lunge-enemy{ 0%{transform:translateX(0)} 40%{transform:translateX(-10px) scale(1.04)} 100%{transform:translateX(0)} }
  @keyframes cast-pulse{ 0%{transform:scale(1); filter:brightness(1);} 35%{transform:scale(1.14) translateY(-2px); filter:brightness(1.6);} 100%{transform:scale(1); filter:brightness(1);} }
  @keyframes flash{ 0%{filter:brightness(1)} 30%{filter:brightness(2.6) saturate(0)} 100%{filter:brightness(1)} }
  @keyframes floaty{ 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-38px);opacity:0} }

  /* ekran sarsıntısı */
  @keyframes shake-sm{ 0%,100%{transform:translate(0,0)} 25%{transform:translate(-2px,1px)} 50%{transform:translate(2px,-1px)} 75%{transform:translate(-1px,-1px)} }
  @keyframes shake-lg{ 0%,100%{transform:translate(0,0)} 20%{transform:translate(-6px,3px)} 40%{transform:translate(5px,-3px)} 60%{transform:translate(-5px,3px)} 80%{transform:translate(4px,-2px)} }
  .arena.shake-sm{ animation:shake-sm .16s ease-in-out; }
  .arena.shake-lg{ animation:shake-lg .32s ease-in-out; }

  /* vuruş parçacıkları */
  .particle{
    position:absolute; border-radius:50%; pointer-events:none; z-index:16;
    animation:particle-fly .5s cubic-bezier(.15,.6,.4,1) forwards;
  }
  @keyframes particle-fly{
    0%{ transform:translate(0,0) scale(1); opacity:1; }
    100%{ transform:translate(var(--dx), var(--dy)) scale(.25); opacity:0; }
  }

  /* menzilli saldırı mermileri */
  .projectile{ position:absolute; pointer-events:none; z-index:14; will-change:transform; }
  .projectile svg{ display:block; overflow:visible; }

  /* seviye atlama kutlaması */
  @keyframes levelup-glow{
    0%{ filter:brightness(1) drop-shadow(0 0 0 transparent); }
    30%{ filter:brightness(1.9) drop-shadow(0 0 10px #e0a545); }
    100%{ filter:brightness(1) drop-shadow(0 0 0 transparent); }
  }
  .unit.levelup svg{ animation:levelup-glow .8s ease-out; }
  .lvl-ring{
    position:absolute; width:10px; height:10px; margin:-5px 0 0 -5px;
    border:2px solid #e0a545; border-radius:50%; pointer-events:none; z-index:17;
    animation:ring-expand .72s ease-out forwards;
  }
  @keyframes ring-expand{ 0%{ transform:scale(.3); opacity:1; } 100%{ transform:scale(3.4); opacity:0; } }
  .lvlup-pop{
    position:absolute; top:-14px; left:50%; transform:translateX(-50%);
    font-weight:800; font-size:10.5px; color:var(--gold);
    text-shadow:0 1px 3px #000, 0 0 8px #e0a54588;
    letter-spacing:.4px; white-space:nowrap; pointer-events:none;
    animation:lvlup-float 1.1s ease-out forwards; z-index:18;
  }
  @keyframes lvlup-float{
    0%{ transform:translate(-50%,0); opacity:0; }
    15%{ opacity:1; }
    100%{ transform:translate(-50%,-46px); opacity:0; }
  }

  /* oto-açılım loot bildirimleri */
  .loot-toasts{
    position:absolute; top:44px; right:10px; display:flex; flex-direction:column; gap:6px;
    z-index:60; pointer-events:none; align-items:flex-end;
  }
  .loot-toast{
    display:flex; align-items:center; gap:8px;
    background:var(--bg-2); border:1px solid var(--line); border-radius:8px;
    padding:6px 10px; font-size:11px; color:var(--ink-dim);
    box-shadow:0 6px 16px -6px #000a; min-width:140px;
    animation:loot-toast-in .22s ease-out both, loot-toast-out .3s ease-in 2.15s forwards;
  }
  .loot-toast .lt-icon{ font-size:16px; }
  .loot-toast .lt-name{ font-weight:600; }
  @keyframes loot-toast-in{ 0%{ transform:translateX(24px); opacity:0; } 100%{ transform:translateX(0); opacity:1; } }
  @keyframes loot-toast-out{ 0%{ opacity:1; } 100%{ opacity:0; transform:translateX(24px); } }

  /* sandık açılış modalı */
  .chest-reveal{ position:relative; z-index:0; text-align:center; }
  .cr-chest{ font-size:44px; display:inline-block; animation:chest-pop .5s ease-out; }
  @keyframes chest-pop{
    0%{ transform:scale(.4) rotate(-8deg); opacity:0; }
    60%{ transform:scale(1.15) rotate(4deg); opacity:1; }
    100%{ transform:scale(1) rotate(0); }
  }
  .cr-item-icon{
    font-size:38px; margin:8px 0 4px; display:block;
    animation:cr-icon-in .4s ease-out .3s both;
  }
  @keyframes cr-icon-in{
    0%{ transform:scale(0) rotate(-20deg); opacity:0; }
    100%{ transform:scale(1) rotate(0); opacity:1; }
  }
  .cr-rarity-label{ font-weight:700; letter-spacing:.6px; font-size:11.5px; text-transform:uppercase; }
  .cr-raylines{
    position:absolute; left:50%; top:36%; width:210px; height:210px; margin:-105px 0 0 -105px;
    background:conic-gradient(from 0deg,
      transparent 0deg, var(--cr-color) 8deg, transparent 18deg, transparent 42deg,
      var(--cr-color) 50deg, transparent 60deg, transparent 84deg, var(--cr-color) 92deg,
      transparent 102deg, transparent 126deg, var(--cr-color) 134deg, transparent 144deg,
      transparent 168deg, var(--cr-color) 176deg, transparent 186deg, transparent 210deg,
      var(--cr-color) 218deg, transparent 228deg, transparent 252deg, var(--cr-color) 260deg,
      transparent 270deg, transparent 294deg, var(--cr-color) 302deg, transparent 312deg,
      transparent 336deg, var(--cr-color) 344deg, transparent 354deg);
    opacity:0; border-radius:50%; z-index:-1; pointer-events:none;
    animation:ray-spin 2.4s linear infinite, ray-fade-in .3s ease-out forwards;
  }
  @keyframes ray-spin{ 0%{ transform:rotate(0); } 100%{ transform:rotate(360deg); } }
  @keyframes ray-fade-in{ 0%{ opacity:0; } 100%{ opacity:.4; } }
  .dmg-pop{
    position:absolute; top:-6px; left:50%; transform:translateX(-50%);
    font-family:var(--font-mono); font-weight:700; font-size:13px;
    color:#f2d9a8; text-shadow:0 1px 2px #000; pointer-events:none;
    animation:floaty .7s ease-out forwards; z-index:10; white-space:nowrap;
  }
  .dmg-pop.crit{ color:var(--danger); font-size:16px; }
  .dmg-pop.heal{ color:var(--heal); }
  .hpbar-wrap{ width:56px; height:6px; background:#000a; border-radius:3px; margin:4px auto 2px; overflow:hidden; border:1px solid #0006; }
  .hpbar{ height:100%; background:linear-gradient(90deg,#7fbf7f,#4f9f5f); transition:width .25s; }
  .hpbar.low{ background:linear-gradient(90deg,#d97a5a,#b1503a); }
  .unit-label{ font-size:10px; color:var(--ink-faint); }
  .unit-lvl{ font-size:9px; color:var(--ink-faint); }

  .log-strip{
    height:88px; border-top:1px solid var(--line); background:var(--bg-0);
    padding:6px 12px; overflow-y:auto; font-size:11.5px; color:var(--ink-faint);
    font-family:var(--font-mono); line-height:1.55;
  }
  .log-strip div{ opacity:.9; }
  .log-strip .lg-gold{ color:var(--gold); }
  .log-strip .lg-rare{ color:var(--r-rare); }
  .log-strip .lg-epic{ color:var(--r-epic); }
  .log-strip .lg-legendary{ color:var(--r-legendary); }
  .log-strip .lg-bad{ color:var(--danger); }
  .log-strip .lg-good{ color:var(--accent-bright); }

  /* ---------- yan panel ---------- */
  .side{ flex:1; display:flex; flex-direction:column; min-width:300px; background:var(--bg-1); }
  .tabs{ display:flex; border-bottom:1px solid var(--line); background:var(--bg-2); }
  .tab{
    flex:1; padding:10px 6px; text-align:center; font-size:12px; color:var(--ink-faint);
    cursor:pointer; border-bottom:2px solid transparent; letter-spacing:.2px;
  }
  .tab:hover{ color:var(--ink-dim); }
  .tab.active{ color:var(--accent-bright); border-bottom-color:var(--accent); background:var(--bg-1); }
  .panel{ flex:1; overflow-y:auto; padding:14px; display:none; }
  .panel.active{ display:block; }

  .hero-card{
    background:var(--bg-2); border:1px solid var(--line); border-radius:8px;
    padding:10px 12px; margin-bottom:10px;
  }
  .hero-card-top{ display:flex; align-items:center; gap:10px; }
  .hero-mini svg{ width:34px; height:34px; }
  .hero-card-name{ font-size:13px; font-weight:600; }
  .hero-card-role{ font-size:10.5px; color:var(--ink-faint); }
  .hero-card .hpbar-wrap{ width:100%; margin:6px 0 2px; }
  .stat-row{ display:flex; flex-wrap:wrap; gap:8px; font-size:11px; color:var(--ink-dim); margin-top:6px; }
  .stat-chip{ background:var(--bg-3); padding:2px 7px; border-radius:5px; }
  .equip-row{ display:flex; gap:6px; margin-top:8px; }
  .equip-slot{
    flex:1; border:1px dashed var(--line); border-radius:6px; padding:5px; font-size:9.5px;
    text-align:center; color:var(--ink-faint); min-height:34px; display:flex; flex-direction:column; justify-content:center;
  }
  .equip-slot.filled{ border-style:solid; }
  .btn{
    background:var(--bg-3); border:1px solid var(--line); color:var(--ink);
    padding:6px 12px; border-radius:6px; font-size:11.5px; cursor:pointer;
    transition:background .15s, border-color .15s;
  }
  .btn:hover:not(:disabled){ background:#413630; border-color:var(--accent-dim); }
  .btn:disabled{ opacity:.35; cursor:default; }
  .btn.primary{ background:var(--accent-dim); border-color:var(--accent); color:#eafbe8; }
  .btn.primary:hover:not(:disabled){ background:var(--accent); }
  .btn.small{ padding:3px 8px; font-size:10.5px; }
  .btn.full{ width:100%; margin-top:8px; }

  .recruit-box{
    border:1px dashed var(--line); border-radius:8px; padding:12px; margin-bottom:10px;
    text-align:center; color:var(--ink-faint); font-size:12px;
  }

  .inv-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(58px,1fr)); gap:8px; margin-bottom:10px; }
  .item-slot{
    aspect-ratio:1; border-radius:7px; border:2px solid var(--line); background:var(--bg-2);
    display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer;
    position:relative;
  }
  .item-slot:hover{ filter:brightness(1.2); }
  .item-slot.common{ border-color:var(--r-common); }
  .item-slot.uncommon{ border-color:var(--r-uncommon); box-shadow:0 0 8px -2px var(--r-uncommon); }
  .item-slot.rare{ border-color:var(--r-rare); box-shadow:0 0 10px -2px var(--r-rare); }
  .item-slot.epic{ border-color:var(--r-epic); box-shadow:0 0 12px -1px var(--r-epic); }
  .item-slot.legendary{ border-color:var(--r-legendary); box-shadow:0 0 14px 0 var(--r-legendary); }

  .item-detail{
    background:var(--bg-3); border:1px solid var(--line); border-radius:8px; padding:12px; margin-bottom:12px;
  }
  .item-detail h4{ margin:0 0 4px; font-size:13px; }
  .item-detail .stat-row{ margin-top:8px; }
  .item-actions{ display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }

  .chest-box{
    background:var(--bg-2); border:1px solid var(--line); border-radius:8px; padding:12px; margin-bottom:12px;
    display:flex; align-items:center; gap:12px;
  }
  .chest-box .chest-icon{ font-size:28px; }
  .chest-box .chest-info{ flex:1; font-size:12px; color:var(--ink-dim); }

  .rune-tree{ display:flex; flex-direction:column; gap:8px; }
  .rune-node{
    background:var(--bg-2); border:1px solid var(--line); border-radius:8px; padding:10px 12px;
    display:flex; align-items:center; gap:10px;
  }
  .rune-node.owned{ border-color:var(--accent); background:#25302a; }
  .rune-node.locked{ opacity:.4; }
  .rune-icon{ font-size:18px; width:26px; text-align:center; }
  .rune-info{ flex:1; }
  .rune-name{ font-size:12.5px; font-weight:600; }
  .rune-desc{ font-size:10.5px; color:var(--ink-faint); }
  .rune-cost{ font-size:11px; color:var(--gold); font-family:var(--font-mono); white-space:nowrap; }

  .section-title{ font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--ink-faint); margin:14px 0 8px; }
  .section-title:first-child{ margin-top:0; }

  .empty-hint{ font-size:11.5px; color:var(--ink-faint); text-align:center; padding:20px 10px; }

  /* modal */
  .modal-back{
    position:absolute; inset:0; background:#000000aa; display:none; align-items:center; justify-content:center; z-index:80;
  }
  .modal-back.show{ display:flex; }
  .modal{
    background:var(--bg-2); border:1px solid var(--line); border-radius:10px; padding:22px; width:min(360px,90%);
    text-align:center;
  }
  .modal h3{ margin:0 0 6px; font-size:15px; }
  .modal p{ font-size:12.5px; color:var(--ink-dim); margin:6px 0 16px; }
  .class-pick{ display:flex; gap:10px; justify-content:center; }
  .class-opt{
    flex:1; background:var(--bg-3); border:1px solid var(--line); border-radius:8px; padding:12px 8px; cursor:pointer;
  }
  .class-opt:hover{ border-color:var(--accent); }
  .class-opt svg{ width:40px; height:40px; }
  .class-opt div.cn{ font-size:12px; margin-top:6px; font-weight:600; }
  .class-opt div.cd{ font-size:10px; color:var(--ink-faint); }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:#4a3d34; border-radius:4px; }
  ::-webkit-scrollbar-track{ background:transparent; }

  @media (max-width:720px){
    .main{ flex-direction:column; }
    .stage-view{ border-right:none; border-bottom:1px solid var(--line); min-height:260px; }
    .os-window{ width:98vw; height:96vh; }
  }
</style>
</head>
<body>

<div class="os-window" id="osWindow">
  <div class="titlebar">
    <span class="tb-icon" id="tbIcon"></span>
    <span class="tb-title">Brake Time Hero — v0.1 prototip</span>
    <div class="tb-btns">
      <div class="tb-btn tb-min" id="btnMin" title="Küçült">–</div>
      <div class="tb-btn tb-max" id="btnMax" title="Büyüt">▢</div>
      <div class="tb-btn tb-close" id="btnClose" title="Kapat">×</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="loot-toasts" id="lootToasts"></div>

  <div class="statbar">
    <div class="stat-item"><span class="stat-icon">💰</span><span class="gold-amt" id="statGold">0</span></div>
    <div class="stat-item"><span class="stat-icon">🔷</span><b id="statEssence">0</b>&nbsp;Öz</div>
    <div class="stage-pill">
      <span id="statStageLabel">Aşama 1</span>
      <div class="stage-nav">
        <button id="stagePrev">◀</button>
        <button id="stageNext">▶</button>
        <button id="stageFrontier" title="En ileri aşamaya dön">⇥</button>
      </div>
    </div>
    <div class="spacer"></div>

    chestCount:0,

    started:false,
    lastSave:Date.now(),
  };
}

function runeOwned(key){ return !!(state.runes && state.runes[key]); }
function runeBonusSum(field){
  let s=0;
  for(const r of RUNES){ if(runeOwned(r.key) && r.effect[field]!==undefined) s+=r.effect[field]; }
  return s;
}
function partyAtkMult(){ return 1+runeBonusSum('atkMult'); }
function partyDefMult(){ return 1+runeBonusSum('defMult'); }
function partyHpMult(){ return 1+runeBonusSum('hpMult'); }
function goldMult(){ return 1+runeBonusSum('goldMult'); }
function dropMult(){ return 1+runeBonusSum('dropMult'); }
function bagBonus(){ return runeBonusSum('bagBonus'); }
function offlineMult(){ return 0.22 + runeBonusSum('offlineMult'); }
function autoOpenActive(){ return runeOwned('autoOpen'); }
function maxUnlockedSlot(){
  let m=1;
  for(const r of RUNES){ if(runeOwned(r.key) && r.effect.unlockSlot) m=Math.max(m,r.effect.unlockSlot); }
  return m;
}

/* ============================================================

============================================================ */

async function saveGame(){
  try{
    state.lastSave = Date.now();
    await window.storage.set(SAVE_KEY, JSON.stringify(state), false);
  }catch(e){ console.warn('Kayıt başarısız:', e); }
}

async function loadGame(){
  try{
    const res = await window.storage.get(SAVE_KEY, false);
    if(res && res.value){ return JSON.parse(res.value); }
    return null;
  }catch(e){
    return null; // anahtar yok ya da hata -> ilk kez oynanıyor
  }
}

let itemIdSeq = 1;
function rollRarity(bonusDropLuck){
  // bonusDropLuck yüksek nadirliklere hafif kaydırma sağlar
  const weights = RARITY.map((r,i)=> r.weight * (1 + bonusDropLuck*0.4*i));
  const total = weights.reduce((a,b)=>a+b,0);
  let roll = Math.random()*total;
  for(let i=0;i<RARITY.length;i++){
    if(roll < weights[i]) return i;
    roll -= weights[i];
  }
  return 0;
}

function generateItem(stageLevel){
  const typeDef = ITEM_TYPES[Math.floor(Math.random()*ITEM_TYPES.length)];
  const rIdx = rollRarity(dropMult());
  const rarity = RARITY[rIdx];
  const base = 3 + stageLevel*1.15;
  const stats = { atk:0, def:0, crit:0, hp:0 };
  const mainVal = Math.round(base * rarity.mult * (typeDef.statKey==='crit'?0.02:1) * (typeDef.statKey==='crit'?1:1));
  if(typeDef.statKey==='crit'){
    stats.crit = +(0.01 + 0.008*stageLevel*rarity.mult).toFixed(3);
    stats.hp = Math.round(base*rarity.mult*0.8);
  } else {
    stats[typeDef.statKey] = Math.round(base*rarity.mult*(typeDef.statKey==='def'?0.8:1));
    if(typeDef.statKey==='armor'||typeDef.statKey==='def') stats.hp = Math.round(base*rarity.mult*1.4);
  }
  return {
    id:'it'+(itemIdSeq++),
    type:typeDef.key,
    icon:typeDef.icon,
    rarity:rarity.key,
    rarityIdx:rIdx,
    name: rarity.label+' '+typeDef.label,
    stats,
    bonus:[], // cilalama ile eklenen ekstra hatlar
  };
}

function itemPower(item){
  if(!item) return 0;
  let p = item.stats.atk*2 + item.stats.def*2.4 + item.stats.hp*0.6 + item.stats.crit*140;
  for(const b of item.bonus) p += (b.atk||0)*2 + (b.def||0)*2.4 + (b.hp||0)*0.6 + (b.crit||0)*140;
  return p;
}

/* ============================================================
   KAHRAMAN YARDIMCI FONKSİYONLAR
============================================================ */

function xpToNext(level){ return Math.round(30 * Math.pow(1.28, level-1)); }

function heroClassDef(h){ return CLASS_DEFS[h.cls]; }

function heroTotalStats(h){
  const cd = heroClassDef(h);
  const lvlMult = Math.pow(1.085, h.level-1);
  let atk = cd.baseAtk*lvlMult;
  let def = cd.baseDef*lvlMult;
  let hp  = cd.baseHp*lvlMult;
  let crit = cd.baseCrit;
  for(const slotKey of ['weapon','armor','trinket']){
    const it = h.equip[slotKey];
    if(!it) continue;
    atk += it.stats.atk||0; def += it.stats.def||0; hp += it.stats.hp||0; crit += it.stats.crit||0;
    for(const b of it.bonus){ atk += b.atk||0; def += b.def||0; hp += b.hp||0; crit += b.crit||0; }
  }
  atk *= partyAtkMult(); def *= partyDefMult(); hp *= partyHpMult();
  return { atk:Math.round(atk), def:Math.round(def), hp:Math.round(hp), crit:Math.min(0.75,crit), atkSpeed:cd.atkSpeed };
}

function makeHero(slot, cls){
  return {
    slot, cls, level:1, xp:0,
    hpCur: heroTotalStatsPreview(cls,1),
    equip:{weapon:null, armor:null, trinket:null},
    atkTimer: Math.random()*600,
    healTimer: 1400,
    downed:false,
  };
}
function heroTotalStatsPreview(cls, level){
  const cd = CLASS_DEFS[cls];
  return Math.round(cd.baseHp*Math.pow(1.085,level-1)*partyHpMult());

/* ============================================================

============================================================ */

// Bir piksel-grid tanımını (satır dizisi + karakter->renk paleti) gerçek
// SVG <rect> öğelerine dönüştürür. Her karakter 1x1 birimlik bir "piksel".
function renderPixelSprite(spriteKey, extraGlow){
  const data = SPRITE_DATA[spriteKey];
  if(!data) return '';
  const rows = data.rows, pal = data.palette;
  const h = rows.length;
  let w = 0;
  for(const r of rows) w = Math.max(w, r.length);
  const glow = extraGlow ? ` filter="drop-shadow(0 0 4px ${extraGlow})"` : '';
  let rects = (spriteKey==='icon') ? '' : `<ellipse cx="${w/2}" cy="${h-0.4}" rx="${w*0.3}" ry="0.7" fill="#000" opacity="0.32"/>`;
  for(let y=0;y<h;y++){
    const r = rows[y];
    for(let x=0;x<r.length;x++){
      const ch = r[x];
      if(ch===' '||!pal[ch]) continue;
      rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="${pal[ch]}"/>`;
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" shape-rendering="crispEdges"${glow}>${rects}</svg>`;
}

function svgUnit(tint, weaponColor, cls, extraGlow){
  return renderPixelSprite(cls, extraGlow);
}

function svgMonster(isBoss){
  return renderPixelSprite(isBoss ? 'boss' : 'monster');
}

// etkileşimini bozmamak için, ayrıca arena birimlerini YENİDEN OLUŞTURMAK yerine
// (ki bu flashUnit ile eklenen 'attack'/'cast'/'hit' animasyon sınıflarını
// boyanmadan önce silerdi) sadece can barlarını/etiketleri günceller.
function renderFrame(){
  renderStatbar();
  updateArenaVitals();
  renderHeroCards();
}

// Mevcut arena DOM elemanlarını YOK ETMEDEN can barı genişliğini ve
// 'down' durumunu günceller — böylece flashUnit ile eklenen geçici
// animasyon sınıfları (attack/cast/hit) bir sonraki tick'e kadar hayatta kalır.
function updateArenaVitals(){
  for(const h of state.heroes){
    const unit = document.getElementById('unit-hero-'+h.slot);
    if(!unit) continue;
    const stats = heroTotalStats(h);
    const hpPct = Math.max(0, h.hpCur/stats.hp*100);
    const bar = unit.querySelector('.hpbar');
    if(bar){ bar.style.width = hpPct+'%'; bar.classList.toggle('low', hpPct<30); }
    unit.classList.toggle('down', !!h.downed);

  document.getElementById('btnPolish').addEventListener('click', ()=>{

/* ============================================================
   VURUŞ PARÇACIKLARI
============================================================ */

function arenaPoint(elId){
  const arena = document.querySelector('.arena');
  const el = document.getElementById(elId);
  if(!arena || !el) return {x:0,y:0};
  return relPoint(arena, el);
}

function relPoint(container, el){
  if(!container || !el) return {x:0,y:0};
  const cr = container.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  return { x: er.left + er.width/2 - cr.left, y: er.top + er.height/2 - cr.top };
}

function spawnParticlesIn(container, x, y, color, count){
  if(!container) return;
  count = count || 7;
  for(let i=0;i<count;i++){
    const ang = Math.random()*Math.PI*2;
    const dist = 18 + Math.random()*26;
    const dx = Math.cos(ang)*dist, dy = Math.sin(ang)*dist;
    const size = 3 + Math.random()*3;
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = x+'px'; p.style.top = y+'px';
    p.style.width = size+'px'; p.style.height = size+'px';
    p.style.background = color;
    p.style.setProperty('--dx', dx+'px');
    p.style.setProperty('--dy', dy+'px');
    container.appendChild(p);
    setTimeout(()=>p.remove(), 520);
  }
}

function spawnParticles(x, y, color, count){
  spawnParticlesIn(document.querySelector('.arena'), x, y, color, count);
}

============================================================ */

function projectileMarkup(kind){
  if(kind==='arrow'){
    return `<svg viewBox="0 0 22 6" width="22" height="6">
      <line x1="1" y1="3" x2="18" y2="3" stroke="#caa15c" stroke-width="1.6"/>
      <path d="M18 0 L22 3 L18 6 Z" fill="#e8cba0"/>
      <path d="M1 1 L4 3 L1 5" stroke="#8a6a3c" stroke-width="1" fill="none"/>
    </svg>`;
  }
  return `<svg viewBox="0 0 16 16" width="16" height="16">
    <circle cx="8" cy="8" r="6.5" fill="#b98be0" opacity="0.35"/>
    <circle cx="8" cy="8" r="3.4" fill="#e2c8f7"/>
    <circle cx="8" cy="8" r="1.6" fill="#fff"/>
  </svg>`;
}

// fromId'den toId'ye doğru bir mermi yollar; mermi hedefe ulaştığında
// onArrive() çağrılır (hasar o anda uygulanır) ve mermi kaldırılır.
function spawnProjectile(fromId, toId, kind, onArrive){
  const arena = document.querySelector('.arena');
  if(!arena){ onArrive(); return; }
  const from = arenaPoint(fromId), to = arenaPoint(toId);
  const el = document.createElement('div');
  el.className = 'projectile '+kind;
  el.innerHTML = projectileMarkup(kind);
  const angle = Math.atan2(to.y-from.y, to.x-from.x) * 180/Math.PI;
  el.style.left = from.x+'px'; el.style.top = from.y+'px';
  el.style.transform = `translate(-50%,-50%) rotate(${kind==='arrow'?angle:0}deg)`;
  el.style.transition = 'left .26s linear, top .26s linear';
  arena.appendChild(el);
  // bir sonraki frame'de hedefe doğru geçiş başlat
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      el.style.left = to.x+'px'; el.style.top = to.y+'px';
    });
  });
  setTimeout(()=>{
    el.remove();
    onArrive();
  }, 270);
}

/* ============================================================
   OYUN DÖNGÜSÜ (COMBAT TICK)
============================================================ */

let tickHandle = null;

function gameTick(){
  if(!enemy) spawnEnemy();
  let allDown = state.heroes.length>0 && state.heroes.every(h=>h.downed);
  if(allDown){
    // parti dağıldı -> kısa süre sonra yeniden canlan
    if(!gameTick._reviving){
      gameTick._reviving = true;
      pushLog(`<span class="lg-bad">Parti dağıldı! Yeniden toparlanıyor...</span>`);
      setTimeout(()=>{
        for(const h of state.heroes){
          const stats = heroTotalStats(h);
          h.hpCur = Math.round(stats.hp*0.5);
          h.downed = false;
        }
        gameTick._reviving = false;
        renderFrame();
      }, 1400);
    }
    renderFrame();
    return;
  }

  for(const h of state.heroes){
    if(h.downed) continue;
    const stats = heroTotalStats(h);
    h.atkTimer -= TICK_MS;
    if(h.atkTimer<=0){
      h.atkTimer = 1000/stats.atkSpeed;
      if(enemy){
        const isCrit = Math.random() < stats.crit;
        let dmg = Math.max(1, Math.round((stats.atk - enemy.def*0.5) * (isCrit?1.8:1)));
        const heroElId = 'unit-hero-'+h.slot;
        const isRanged = (h.cls==='ranger' || h.cls==='mage');
        if(isRanged){
          // ok/büyü mermisi hedefe uçar, hasar mermi vardığında uygulanır
          flashUnit(heroElId, 'cast');
          const kind = h.cls==='ranger' ? 'arrow' : 'bolt';
          const targetEnemy = enemy;
          spawnProjectile(heroElId, 'unit-enemy', kind, ()=>{
            if(!targetEnemy || enemy!==targetEnemy) return; // düşman artık geçersiz (öldü/değişti)
            enemy.hp -= dmg;
            flashUnit('unit-enemy','hit');
            popDamage('unit-enemy', dmg, isCrit?'crit':'');
            const pt = arenaPoint('unit-enemy');
            spawnParticles(pt.x, pt.y, isCrit?'#ff6b52':'#f2d9a8', isCrit?11:6);
            screenShake(isCrit?'lg':'sm');
            if(enemy.hp<=0){ onEnemyDefeated(); } else { updateArenaVitals(); }
          });
        } else {
          // yakın dövüş: hasar anında uygulanır
          enemy.hp -= dmg;
          flashUnit(heroElId,'attack');
          popDamage('unit-enemy', dmg, isCrit?'crit':'');
          flashUnit('unit-enemy','hit');
          const pt = arenaPoint('unit-enemy');
          spawnParticles(pt.x, pt.y, isCrit?'#ff6b52':'#f2d9a8', isCrit?11:6);
          screenShake(isCrit?'lg':'sm');
          if(enemy.hp<=0){ onEnemyDefeated(); return; }
        }
      }
    }
    if(heroClassDef(h).heal){
      h.healTimer -= TICK_MS;
      if(h.healTimer<=0){
        h.healTimer = 2600;
        let lowest=null, lowestPct=1;
        for(const hh of state.heroes){
          if(hh.downed) continue;
          const st2 = heroTotalStats(hh);
          const pct = hh.hpCur/st2.hp;
          if(pct<lowestPct){ lowestPct=pct; lowest=hh; }
        }
        if(lowest && lowestPct<0.95){
          const healAmt = Math.round(stats.atk*1.6);
          const st2 = heroTotalStats(lowest);
          lowest.hpCur = Math.min(st2.hp, lowest.hpCur+healAmt);
          popDamage('unit-hero-'+lowest.slot, '+'+healAmt, 'heal');
        }
      }
    }
  }

  if(enemy){
    enemy.atkTimer -= TICK_MS;
    if(enemy.atkTimer<=0){
      enemy.atkTimer = 900;
      const alive = state.heroes.filter(h=>!h.downed);
      if(alive.length>0){
        const tank = alive.find(h=>h.cls==='knight') || alive[Math.floor(Math.random()*alive.length)];
        const stats = heroTotalStats(tank);
        const dmg = Math.max(1, Math.round(enemy.atk - stats.def*0.5));
        tank.hpCur -= dmg;
        flashUnit('unit-enemy','attack');
        popDamage('unit-hero-'+tank.slot, dmg, '');
        flashUnit('unit-hero-'+tank.slot,'hit');
        const pt = arenaPoint('unit-hero-'+tank.slot);
        spawnParticles(pt.x, pt.y, '#c1594a', tank.hpCur<=0?10:5);
        screenShake(tank.hpCur<=0?'lg':'sm');
        if(tank.hpCur<=0){ tank.hpCur=0; tank.downed=true; pushLog(`<span class="lg-bad">${CLASS_DEFS[tank.cls].name} yere düştü!</span>`); }
      }
    }
  }

  renderFrame();
}

function onEnemyDefeated(){
  const wasBoss = enemy.isBoss;
  const goldGain = Math.round((wasBoss? 40:8) * Math.pow(1.1,state.stage-1) * goldMult());
  state.gold += goldGain;
  pushLog(`<span class="lg-gold">${enemy.name} yenildi (+${goldGain}💰)</span>`);

  // XP dağıt
  for(const h of state.heroes){
    if(h.downed) continue;
    h.xp += wasBoss? 18:5;
    const need = xpToNext(h.level);
    if(h.xp>=need){
      h.xp -= need; h.level++;
      const stats = heroTotalStats(h);
      h.hpCur = stats.hp;
      pushLog(`<span class="lg-good">${CLASS_DEFS[h.cls].name} seviye atladı: Sv.${h.level}</span>`);
      celebrateLevelUp(h);
    }
  }

  // sandık şansı
  const chestChance = (wasBoss? 0.9 : 0.16) * dropMult();
  if(Math.random() < chestChance || wasBoss){
    if(autoOpenActive()){
      const result = openOneChest(true);
      if(!result.autoSold) showLootToast(result.item);
    } else {
      state.chestCount++;
      pushLog(`<span class="lg-rare">Bir sandık düştü! (Envanter sekmesinden aç)</span>`);
    }
  }
  // ender materyal: öz
  if(Math.random()<0.35) state.essence += wasBoss?3:1;

  if(wasBoss){
    state.stage++;
    state.maxStageReached = Math.max(state.maxStageReached, state.stage);
    state.waveInStage = 0;
    pushLog(`<span class="lg-good">Aşama ${state.stage}'e ilerlendi!</span>`);
  } else {
    state.waveInStage++;
  }
  enemy = null;
  spawnEnemy();
  saveGame();
  render();
}

function openOneChest(silent){
  const item = generateItem(state.stage);
  const cap = state.inventoryCap + bagBonus();
  const result = { item, autoSold:false, sellVal:0 };
  if(state.inventory.length >= cap){
    const val = Math.round(15*RARITY[item.rarityIdx].mult);
    state.gold += val;
    result.autoSold = true; result.sellVal = val;
    if(!silent) pushLog(`<span class="lg-gold">Envanter dolu, '${item.name}' otomatik satıldı (+${val}💰)</span>`);
  } else {
    state.inventory.push(item);
    const cls = item.rarityIdx>=4?'lg-legendary':(item.rarityIdx>=3?'lg-epic':(item.rarityIdx>=2?'lg-rare':''));
    pushLog(`<span class="${cls}">Sandıktan çıktı: ${item.name}</span>`);
  }
  if(state.chestCount>0) state.chestCount--;
  return result;
}

/* ============================================================
   BAŞLANGIÇ / GİRİŞ MODALLARI
============================================================ */

function showModal(html){
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBack').classList.add('show');
}
function hideModal(){ document.getElementById('modalBack').classList.remove('show'); }

function showClassPickModal(){
  showModal(`
    <h3>İlk Kahramanını Seç</h3>
    <p>Maceran burada başlıyor. Hangi kahramanla yola çıkmak istersin?</p>
    <div class="class-pick">
      <div class="class-opt" data-cls="knight">
        ${svgUnit(CLASS_DEFS.knight.tint, CLASS_DEFS.knight.weapon,'knight')}
        <div class="cn">Şövalye</div>
        <div class="cd">Sağlam, güvenli başlangıç</div>
      </div>
      <div class="class-opt" data-cls="ranger">
        ${svgUnit(CLASS_DEFS.ranger.tint, CLASS_DEFS.ranger.weapon,'ranger')}
        <div class="cn">Okçu</div>
        <div class="cd">Hızlı, kırılgan, yüksek hasar</div>
      </div>
    </div>
  `);
  document.querySelectorAll('.class-opt').forEach(el=>{
    el.addEventListener('click', ()=>{
      const cls = el.dataset.cls;
      state.heroes.push(makeHero(1, cls));
      state.started = true;
      hideModal();
      pushLog(`<span class="lg-good">Maceraya ${CLASS_DEFS[cls].name} ile başlandı.</span>`);
      render(); saveGame();
    });
  });
}

function showOfflineModal(seconds, gained){
  const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60);
  showModal(`
    <h3>Tekrar hoş geldin!</h3>
    <p>${h} sa ${m} dk uzaktaydın.<br>Kahramanların bu süre boyunca <b style="color:var(--gold)">+${gained}💰</b> topladı.</p>
    <button class="btn primary" id="btnOfflineOk">Devam Et</button>
  `);
  document.getElementById('btnOfflineOk').addEventListener('click', hideModal);
}

/* ============================================================
   ETKİLEŞİMLER
============================================================ */

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
  });
});

document.getElementById('stagePrev').addEventListener('click', ()=>{
  if(state.stage>1){ state.stage--; state.waveInStage=0; enemy=null; render(); saveGame(); }
});
document.getElementById('stageNext').addEventListener('click', ()=>{
  if(state.stage<state.maxStageReached){ state.stage++; state.waveInStage=0; enemy=null; render(); saveGame(); }
});
document.getElementById('stageFrontier').addEventListener('click', ()=>{
  state.stage = state.maxStageReached; state.waveInStage=0; enemy=null; render(); saveGame();
  showToast('En ileri aşamaya dönüldü.');
});
document.getElementById('btnOpenChest').addEventListener('click', ()=>{
  if(state.chestCount>0){
    const result = openOneChest(false);
    render(); saveGame();
    if(!result.autoSold) showChestRevealModal(result.item);
  }
});
document.getElementById('btnReset').addEventListener('click', ()=>{
  showModal(`
    <h3>Kaydı sıfırla?</h3>
    <p>Tüm ilerlemen kalıcı olarak silinecek. Bu işlem geri alınamaz.</p>
    <div style="display:flex; gap:8px; justify-content:center;">
      <button class="btn" id="cancelReset">Vazgeç</button>
      <button class="btn primary" id="confirmReset" style="background:var(--danger);border-color:#8f3d31;">Evet, Sıfırla</button>
    </div>
  `);
  document.getElementById('cancelReset').addEventListener('click', hideModal);
  document.getElementById('confirmReset').addEventListener('click', async ()=>{
    hideModal();
    state = freshState();
    enemy = null;
    await saveGame();
    showClassPickModal();
    render();
  });
});

document.getElementById('btnMin').addEventListener('click', ()=>{
  document.getElementById('osWindow').classList.toggle('minimized');
});
document.getElementById('btnMax').addEventListener('click', ()=>{
  showToast('Bu pencere zaten en iyi boyutunda 🙂');
});
document.getElementById('btnClose').addEventListener('click', ()=>{
  showToast('Kapatma yalnızca gerçek masaüstü sürümünde çalışır.');
});

/* ============================================================
   BAŞLATMA
============================================================ */

async function init(){
  // başlık çubuğu ikonu + favicon (aynı piksel-sprite verisinden üretilir)
  const iconSvg = renderPixelSprite('icon');
  const tbIconEl = document.getElementById('tbIcon');
  if(tbIconEl) tbIconEl.innerHTML = iconSvg;
  const favLink = document.createElement('link');
  favLink.rel = 'icon';
  favLink.type = 'image/svg+xml';
  favLink.href = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);
  document.head.appendChild(favLink);

  const loaded = await loadGame();
  if(loaded){
    state = loaded;
    // eski kayıtlarla uyumluluk için eksik alanları tamamla
    const fresh = freshState();
    for(const k in fresh){ if(state[k]===undefined) state[k]=fresh[k]; }
    for(const h of state.heroes){ if(h.downed===undefined) h.downed=false; if(h.healTimer===undefined) h.healTimer=1400; }
  } else {
    state = freshState();
  }

  if(!state.started || state.heroes.length===0){
    render();
    showClassPickModal();
  } else {
    // çevrimdışı ilerleme hesapla
    const elapsed = Math.min(MAX_OFFLINE_SECONDS, Math.max(0, Math.floor((Date.now()-state.lastSave)/1000)));
    if(elapsed > 60){
      const avgGoldPerSec = 0.9 * Math.pow(1.06, state.stage-1);
      const gained = Math.round(elapsed * avgGoldPerSec * offlineMult());
      state.gold += gained;
      render();
      showOfflineModal(elapsed, gained);
    } else {
      render();
    }
  }

  spawnEnemy();
  render();
  tickHandle = setInterval(gameTick, TICK_MS);
  setInterval(saveGame, 10000);
  window.addEventListener('beforeunload', ()=>{ saveGame(); });
}

init();

})();
</script>
